name: deploy-azure

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: Azure resource group name
        required: true
        default: rg-workcore-prod-uaen
      location:
        description: Azure region
        required: true
        default: uaenorth
      deploy_frontdoor:
        description: Deploy Front Door and routes
        type: boolean
        required: true
        default: true
      deploy_builder_ui:
        description: Build and deploy builder UI to Azure Static Web Apps
        type: boolean
        required: true
        default: true
      swa_allow_insecure_tls_download:
        description: Set NODE_TLS_REJECT_UNAUTHORIZED=0 for SWA CLI deploy metadata download
        type: boolean
        required: true
        default: false
      configure_ui_entra_auth:
        description: Configure Entra ID app settings for SWA auth
        type: boolean
        required: true
        default: false
      create_entra_app_registration:
        description: Auto-create Entra app registration when configuring SWA auth
        type: boolean
        required: true
        default: false
      entra_app_name:
        description: Entra app registration display name (used when auto-create is enabled)
        required: false
        default: workcore-builder-swa
      enable_secondary_api_domain:
        description: Enable the secondary API domain route (api.runwcr.com cutover)
        type: boolean
        required: true
        default: false
      workcore_domain:
        description: Optional workcore custom domain (for Front Door)
        required: false
        default: ''
      api_primary_domain:
        description: Primary API custom domain
        required: true
        default: api.hq21.tech
      api_secondary_domain:
        description: Secondary API custom domain (activated by enable_secondary_api_domain)
        required: true
        default: api.runwcr.com
      chatkit_domain:
        description: Optional chatkit custom domain (for Front Door)
        required: false
        default: ''
      cors_allow_origins:
        description: Optional CORS allowlist for orchestrator/chatkit (comma-separated)
        required: false
        default: ''
      integration_http_allowed_hosts:
        description: Optional integration HTTP allowed hosts (comma-separated)
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: acrworkcoreproduaen
  KEY_VAULT_NAME: kv-workcore-prod-uaen
  LOG_ANALYTICS_NAME: law-workcore-prod-uaen
  ACA_ENV_NAME: cae-workcore-prod-uaen
  STORAGE_ACCOUNT_NAME: stworkcoreproduaen
  MINIO_SHARE_NAME: minio-data
  SWA_NAME: swa-workcore-prod-uaen
  SWA_LOCATION: westeurope
  AOAI_ACCOUNT_NAME: aoai-workcore-prod-uaen
  VNET_NAME: vnet-workcore-prod-uaen
  POSTGRES_SUBNET_NAME: snet-postgres-flex
  CONTAINERAPPS_SUBNET_NAME: snet-containerapps
  CONTAINERAPPS_SUBNET_PREFIX: 10.42.2.0/23
  POSTGRES_SERVER_NAME: pg-workcore-prod-uaen
  POSTGRES_DB_NAME: workflow
  POSTGRES_ADMIN_LOGIN: workcoreadmin
  POSTGRES_SKU_NAME: Standard_B2s
  POSTGRES_SKU_TIER: Burstable
  POSTGRES_BACKUP_RETENTION_DAYS: '14'
  ORCHESTRATOR_APP_NAME: ca-orchestrator
  CHATKIT_APP_NAME: ca-chatkit
  MCP_BRIDGE_APP_NAME: ca-mcp-bridge
  MINIO_APP_NAME: ca-minio
  MIGRATE_JOB_NAME: caj-migrate-workcore

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Azure subscription context
        run: az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Ensure required Azure extensions
        run: |
          az extension add --name containerapp --upgrade --yes
          az extension add --name front-door --upgrade --yes

      - name: Deploy foundation infrastructure
        env:
          AZ_RESOURCE_GROUP: ${{ inputs.resource_group }}
          AZ_LOCATION: ${{ inputs.location }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: 2025-03-01-preview
          WORKCORE_API_AUTH_TOKEN: ${{ secrets.WORKCORE_API_AUTH_TOKEN }}
          WEBHOOK_DEFAULT_INBOUND_SECRET: ${{ secrets.WEBHOOK_DEFAULT_INBOUND_SECRET }}
          CHATKIT_AUTH_TOKEN: ${{ secrets.CHATKIT_AUTH_TOKEN }}
          MCP_BRIDGE_AUTH_TOKEN: ${{ secrets.MCP_BRIDGE_AUTH_TOKEN }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
        run: ./deploy/azure/scripts/deploy_infra.sh

      - name: Deploy Azure OpenAI model deployments
        env:
          AZ_RESOURCE_GROUP: ${{ inputs.resource_group }}
          AZ_LOCATION: ${{ inputs.location }}
        run: ./deploy/azure/scripts/deploy_openai_deployments.sh

      - name: Configure SWA Entra auth (optional)
        if: ${{ inputs.configure_ui_entra_auth }}
        env:
          AZ_RESOURCE_GROUP: ${{ inputs.resource_group }}
          SWA_NAME: ${{ env.SWA_NAME }}
          KEY_VAULT_NAME: ${{ env.KEY_VAULT_NAME }}
          WORKCORE_DOMAIN: ${{ inputs.workcore_domain }}
          CREATE_ENTRA_APP: ${{ inputs.create_entra_app_registration }}
          ENTRA_APP_NAME: ${{ inputs.entra_app_name }}
          ENTRA_CLIENT_ID: ${{ secrets.SWA_ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.SWA_ENTRA_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.SWA_ENTRA_TENANT_ID }}
        run: ./deploy/azure/scripts/configure_swa_entra_auth.sh

      - name: Build and deploy builder UI (SWA)
        if: ${{ inputs.deploy_builder_ui }}
        env:
          AZ_RESOURCE_GROUP: ${{ inputs.resource_group }}
          SWA_NAME: ${{ env.SWA_NAME }}
          SWA_ALLOW_INSECURE_TLS_DOWNLOAD: ${{ inputs.swa_allow_insecure_tls_download }}
        run: ./deploy/azure/scripts/deploy_builder_swa.sh

      - name: Build and push WorkCore runtime image
        id: build
        env:
          AZ_RESOURCE_GROUP: ${{ inputs.resource_group }}
        run: |
          ACR_LOGIN_SERVER="$(az acr show --resource-group "${AZ_RESOURCE_GROUP}" --name "${ACR_NAME}" --query loginServer -o tsv)"
          az acr login --name "${ACR_NAME}"

          IMAGE_TAG="${GITHUB_SHA}"
          IMAGE_REF="${ACR_LOGIN_SERVER}/workcore-orchestrator:${IMAGE_TAG}"

          docker build \
            --file deploy/docker/Dockerfile.orchestrator \
            --tag "${IMAGE_REF}" \
            .

          docker push "${IMAGE_REF}"
          echo "image_ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"

      - name: Deploy Container Apps + migration job
        env:
          AZ_RESOURCE_GROUP: ${{ inputs.resource_group }}
          AZ_LOCATION: ${{ inputs.location }}
          WORKCORE_IMAGE: ${{ steps.build.outputs.image_ref }}
          CORS_ALLOW_ORIGINS: ${{ inputs.cors_allow_origins }}
          INTEGRATION_HTTP_ALLOWED_HOSTS: ${{ inputs.integration_http_allowed_hosts }}
        run: ./deploy/azure/scripts/deploy_apps.sh

      - name: Deploy Front Door + WAF
        if: ${{ inputs.deploy_frontdoor }}
        env:
          AZ_RESOURCE_GROUP: ${{ inputs.resource_group }}
          WORKCORE_DOMAIN: ${{ inputs.workcore_domain }}
          API_PRIMARY_DOMAIN: ${{ inputs.api_primary_domain }}
          API_SECONDARY_DOMAIN: ${{ inputs.api_secondary_domain }}
          ENABLE_SECONDARY_API_DOMAIN: ${{ inputs.enable_secondary_api_domain }}
          CHATKIT_DOMAIN: ${{ inputs.chatkit_domain }}
        run: ./deploy/azure/scripts/deploy_frontdoor.sh
