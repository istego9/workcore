name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ci: ${{ steps.filter.outputs.ci }}
      specs: ${{ steps.filter.outputs.specs }}
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      builder: ${{ steps.filter.outputs.builder }}
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 2)
        if: steps.checkout1.outcome != 'success'
        id: checkout2
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 3)
        if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success'
        id: checkout3
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Fail if checkout failed after retries
        if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success' && steps.checkout3.outcome != 'success'
        run: exit 1
      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci:
              - ".github/workflows/ci.yml"
            specs:
              - "AGENTS.md"
              - "docs/api/**"
              - "docs/architecture/**"
              - "docs/DEV_WORKFLOW.md"
              - "db/migrations/**"
              - "scripts/archctl_validate.sh"
            orchestrator:
              - "apps/orchestrator/**"
              - "db/migrations/**"
              - "scripts/**"
              - "docs/api/**"
            builder:
              - "apps/builder/**"

  spec-gates:
    needs: changes
    if: needs.changes.outputs.specs == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 2)
        if: steps.checkout1.outcome != 'success'
        id: checkout2
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 3)
        if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success'
        id: checkout3
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Fail if checkout failed after retries
        if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success' && steps.checkout3.outcome != 'success'
        run: exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run spec validation gate
        run: ./scripts/archctl_validate.sh

      - name: Run public chat contract drift sentinel
        run: python scripts/check_public_contract_drift.py

  orchestrator-tests:
    needs: changes
    if: needs.changes.outputs.orchestrator == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 2)
        if: steps.checkout1.outcome != 'success'
        id: checkout2
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 3)
        if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success'
        id: checkout3
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Fail if checkout failed after retries
        if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success' && steps.checkout3.outcome != 'success'
        run: exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/orchestrator/requirements.txt
          pip install pytest

      - name: Run orchestrator tests
        run: python -m pytest apps/orchestrator/tests

  builder-unit:
    needs: changes
    if: needs.changes.outputs.builder == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/builder
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 2)
        if: steps.checkout1.outcome != 'success'
        id: checkout2
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 3)
        if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success'
        id: checkout3
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Fail if checkout failed after retries
        if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success' && steps.checkout3.outcome != 'success'
        run: exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/builder/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run builder unit tests
        run: npm run test:unit

  builder-e2e-smoke:
    needs: [changes, builder-unit]
    if: needs.changes.outputs.builder == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/builder
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 2)
        if: steps.checkout1.outcome != 'success'
        id: checkout2
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 3)
        if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success'
        id: checkout3
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Fail if checkout failed after retries
        if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success' && steps.checkout3.outcome != 'success'
        run: exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/builder/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build builder app
        run: npm run build

      - name: Run smoke e2e against local preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 >/tmp/builder-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill ${PREVIEW_PID}' EXIT

          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:4173/" >/dev/null; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "builder preview did not become ready" >&2
              exit 1
            fi
            sleep 1
          done

          E2E_BASE_URL="http://127.0.0.1:4173" E2E_WORKERS=1 npm run test:e2e:smoke

  fullstack-chat-contract:
    needs: changes
    if: needs.changes.outputs.builder == 'true' || needs.changes.outputs.orchestrator == 'true' || needs.changes.outputs.specs == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout (attempt 1)
        id: checkout1
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 2)
        if: steps.checkout1.outcome != 'success'
        id: checkout2
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Checkout (attempt 3)
        if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success'
        id: checkout3
        uses: actions/checkout@v4
        continue-on-error: true
      - name: Fail if checkout failed after retries
        if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success' && steps.checkout3.outcome != 'success'
        run: exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/builder/package-lock.json

      - name: Install builder dependencies
        working-directory: apps/builder
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: apps/builder
        run: npx playwright install --with-deps chromium

      - name: Prepare local DNS aliases
        run: |
          echo "127.0.0.1 workcore.build api.workcore.build chatkit.workcore.build" | sudo tee -a /etc/hosts

      - name: Prepare docker env
        run: cp .env.docker.example .env.docker

      - name: Start full stack
        run: docker compose --env-file .env.docker -f docker-compose.workcore.yml up -d --build --wait

      - name: Run full-stack chat contract acceptance
        env:
          E2E_BASE_URL: http://workcore.build:8080
          E2E_API_BASE_URL: http://api.workcore.build:8080
          E2E_CHAT_API_URL: http://api.workcore.build:8080/chat
          E2E_API_AUTH_TOKEN: dev_workcore_api_token
          ACCEPTANCE_URL: http://workcore.build:8080/?e2e=1
        run: ./scripts/e2e_suite.sh

      - name: Upload acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-package
          path: artifacts/acceptance
          if-no-files-found: ignore

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose --env-file .env.docker -f docker-compose.workcore.yml logs --tail=200

      - name: Shutdown full stack
        if: always()
        run: docker compose --env-file .env.docker -f docker-compose.workcore.yml down -v
