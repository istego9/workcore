        auth_profile:
          $ref: '#/components/schemas/IntegrationAuthProfile'
        required_headers:
          type: array
          items: { type: string }
        optional_headers:
          type: array
          items: { type: string }
        project_scope:
          $ref: '#/components/schemas/IntegrationProjectScope'
        deprecations:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationDeprecation'
        operator_notes:
          type: array
          items: { type: string }
        allowed_domains:
          type: array
          items: { type: string }
        rate_limit_profile:
          type: string
          nullable: true
        secret_expiry:
