openapi: 3.0.3
info:
  title: Workflow Platform API
  version: 0.24.5
  description: >
    MVP+ API for workflows, runs, interrupts, streaming, and webhooks with transparent run metadata propagation.
    Project orchestration mode supports intent routing, disambiguation, workflow switching, and direct workflow start.
    External clients authenticate via Microsoft Entra OAuth2 client_credentials and call the API through APIM gateway.
    API requests (except `/health`, docs/schema endpoints, and signed inbound webhooks) must include `Authorization: Bearer <access_token>`.
servers:
  - url: https://api.example.com

security:
  - oauthClientCredentials:
      - api://workcore-partner-api/.default

tags:
  - name: projects
  - name: workflows
  - name: capabilities
  - name: runs
  - name: handoff
  - name: interrupts
  - name: streaming
  - name: webhooks
  - name: chatkit
  - name: orchestrator
  - name: partner-admin

paths:
  /openapi.yaml:
    get:
      tags: [workflows]
      summary: OpenAPI contract
      security: []
      responses:
        '200':
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string
  /api-reference:
    get:
      tags: [workflows]
      summary: Human-readable API reference
      security: []
      responses:
        '200':
          description: API reference in Markdown
          content:
            text/markdown:
              schema:
                type: string
  /workflow-authoring-guide:
    get:
      tags: [workflows]
      summary: Workflow authoring guide for agents
      security: []
      responses:
        '200':
          description: Workflow authoring guide in Markdown
          content:
            text/markdown:
              schema:
                type: string
  /schemas/workflow-draft.schema.json:
    get:
      tags: [workflows]
      summary: JSON Schema for workflow draft payloads
      security: []
      responses:
        '200':
          description: JSON Schema document
          content:
            application/json:
              schema:
                type: object
  /schemas/workflow-export-v1.schema.json:
    get:
      tags: [workflows]
      summary: JSON Schema for workflow export v1 payloads
      security: []
      responses:
        '200':
          description: JSON Schema document
          content:
            application/json:
              schema:
                type: object
  /schemas/routing-decision.schema.json:
    get:
      tags: [orchestrator]
      summary: JSON Schema for strict orchestrator routing decisions
      security: []
      responses:
        '200':
          description: JSON Schema document
          content:
            application/json:
              schema:
                type: object
  /schemas/chatkit-input-transcribe-request.schema.json:
    get:
      tags: [chatkit]
      summary: JSON Schema for ChatKit input.transcribe request payload
      security: []
      responses:
        '200':
          description: JSON Schema document
          content:
            application/json:
              schema:
                type: object
  /schemas/chatkit-widget-extension.schema.json:
    get:
      tags: [chatkit]
      summary: JSON Schema for fork frontend widget extension payloads
      security: []
      responses:
        '200':
          description: JSON Schema document
          content:
            application/json:
              schema:
                type: object
  /agent-integration-kit:
    get:
      tags: [workflows]
      summary: Integration kit for external agents (Markdown)
      security: []
      responses:
        '200':
          description: Integration kit with all required resource links
          content:
            text/markdown:
              schema:
                type: string
  /agent-integration-kit.json:
    get:
      tags: [workflows]
      summary: Integration kit for external agents (JSON bundle + canonical manifest)
      security: []
      responses:
        '200':
          description: Machine-readable integration bundle with canonical integration manifest and doctor report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentIntegrationKit'
              example:
                title: WorkCore Agent Integration Kit
                updated_at: '2026-03-11T12:30:00Z'
                urls:
                  integration_kit_json: https://api.hq21.tech/agent-integration-kit.json
                  integration_test_json: https://api.hq21.tech/agent-integration-test.json
                  chat_endpoint: https://api.hq21.tech/chat
                integration_manifest:
                  api_base_url: https://api.hq21.tech
                  chat_api_url: https://api.hq21.tech/chat
                  auth_profile:
                    type: oauth_client_credentials
                    scope: api://workcore-partner-api/.default
                  required_headers:
                    - Authorization
                    - X-Tenant-Id
                  optional_headers:
                    - X-Project-Id
                    - X-Correlation-Id
                    - X-Trace-Id
                integration_test:
                  summary:
                    status: WARN
                    passed: 8
                    warned: 2
                    failed: 0
                    total: 10
  /agent-integration-test:
    get:
      tags: [workflows]
      summary: Interactive integration test UI for external agents
      security: []
      responses:
        '200':
          description: HTML page with integration checks and draft validator
          content:
            text/html:
              schema:
                type: string
  /agent-integration-test.json:
    get:
      tags: [workflows]
      summary: Integration doctor report
      security: []
      parameters:
        - in: query
          name: project_id
          required: false
          schema:
            type: string
          description: Optional project scope override for project readiness checks.
      responses:
        '200':
          description: Doctor-style machine-readable readiness report with PASS/WARN/FAIL checks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentIntegrationCheckReport'
              example:
                title: WorkCore Agent Integration Doctor
                generated_at: '2026-03-11T12:30:00Z'
                summary:
                  status: WARN
                  passed: 7
                  warned: 3
                  failed: 0
                  total: 10
                checks:
                  - id: auth_profile_canonical
                    status: PASS
                    severity: medium
                    code: AUTH_PROFILE_OK
                    title: Canonical auth profile is configured
                    message: OAuth client_credentials profile is available.
                    observed: oauth_client_credentials
                    expected: oauth_client_credentials
                    remediation: Keep current auth profile.
                    docs_ref: /api-reference#authentication
  /agent-integration-test/validate-draft:
    post:
      tags: [workflows]
      summary: Validate workflow draft against runtime publish rules
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                draft:
                  $ref: '#/components/schemas/WorkflowDraft'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDraftValidationResult'
  /agent-integration-logs:
    get:
      tags: [workflows]
      summary: Detailed integration logs for external agents
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - in: query
          name: correlation_id
          required: false
          schema:
            type: string
        - in: query
          name: trace_id
          required: false
          schema:
            type: string
        - in: query
          name: event
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Filtered integration log report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentIntegrationLogReport'
        '401': { $ref: '#/components/responses/ErrorResponse' }
  /internal/partner-access:
    get:
      tags: [partner-admin]
      summary: Internal partner onboarding portal (HTML)
      description: >
        Internal operator portal page for partner onboarding package generation.
        Access is restricted to Microsoft Entra-authenticated internal users via EasyAuth principal headers.
      security:
        - entraEasyAuthPrincipal: []
      responses:
        '200':
          description: HTML portal page
          content:
            text/html:
              schema:
                type: string
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
  /internal/partner-access/onboard-package:
    post:
      tags: [partner-admin]
      summary: Generate partner onboarding ZIP package
      description: >
        Executes internal onboarding automation for a partner app and returns a ZIP package
        with canonical operator/partner artifacts:
        `README.md`, `.env.partner`, `integration_manifest.json`,
        and `curl_examples/check_auth.sh`, `curl_examples/check_project_scope.sh`,
        `curl_examples/check_chat.sh` including generated credentials.
        For partner identities containing `epam`, generated onboarding artifacts are pinned to
        `https://api.runwcr.com` and `allowed_domains=["api.runwcr.com"]`.
      security:
        - entraEasyAuthPrincipal: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerSelfServiceOnboardRequest'
      responses:
        '200':
          description: Onboarding package ZIP
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
  /chat:
    parameters:
      - $ref: '#/components/parameters/TenantIdRequired'
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorrelationId'
    post:
      tags: [chatkit]
      summary: ChatKit advanced integration endpoint
      description: >
        Handles ChatKit thread/message/action requests for external clients.
        Strict multi-tenant mode requires `X-Tenant-Id` on every request.
        For `threads.create`, workflow resolution is project-centric and additive:
        `metadata.workflow_id` keeps explicit direct workflow mode, otherwise
        `metadata.project_id`, otherwise `X-Project-Id`, resolves the project's
        configured default chat workflow.
        For interactive operations (`threads.create`, `threads.add_user_message`, `threads.custom_action`)
        the response is streamed as SSE where each `data:` line is a JSON ChatKit stream event.
        For `input.transcribe` requests, the response is non-streaming JSON with transcription text.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatKitRequest'
            examples:
              thread_create_project_default:
                summary: Create thread from project default chat workflow
                value:
                  metadata:
                    project_id: proj_chat
                    external_user_id: user_42
                    external_session_id: session_abc
                  type: threads.create
                  params:
                    input:
                      content:
                        - type: input_text
                          text: start
                      attachments: []
                      inference_options: {}
              thread_create_explicit_workflow:
                summary: Create thread and start run with explicit workflow override
                value:
                  metadata:
                    workflow_id: wf_chat
                    workflow_version_id: v1
                    project_id: proj_chat
                    external_user_id: user_42
                    external_session_id: session_abc
                  type: threads.create
                  params:
                    input:
                      content:
                        - type: input_text
                          text: start
                      attachments: []
                      inference_options: {}
              add_user_message:
                summary: Continue existing thread with a user message
                value:
                  metadata:
                    external_user_id: user_42
                    external_session_id: session_abc
                  type: threads.add_user_message
                  params:
                    thread_id: thr_01
                    input:
                      content:
                        - type: input_text
                          text: please continue
                      attachments: []
                      inference_options: {}
              interrupt_action:
                summary: Approve interrupt from widget/action button
                value:
                  metadata:
                    external_user_id: user_42
                    external_session_id: session_abc
                  type: threads.custom_action
                  params:
                    thread_id: thr_01
                    item_id: null
                    action:
                      action_type: interrupt.approve
                      payload:
                        run_id: run_01
                        interrupt_id: intr_01
                        idempotency_key: action_approve_01
              input_transcribe:
                summary: Transcribe audio payload to text
                value:
                  metadata:
                    external_user_id: user_42
                    external_session_id: session_abc
                  type: input.transcribe
                  params:
                    audio_base64: SGVsbG8=
                    mime_type: audio/webm;codecs=opus
      responses:
        '200':
          description: >
            ChatKit response (JSON or SSE stream). For stream responses each `data:` line
            is a JSON object matching `ChatKitStreamEvent`. For `input.transcribe`,
            response payload matches `ChatKitTranscriptionResult`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ChatKitJsonResponse'
                  - $ref: '#/components/schemas/ChatKitTranscriptionResult'
            text/event-stream:
              schema:
                type: string
              example: |
                data: {"type":"thread.created","thread":{"id":"thr_01"}}
                data: {"type":"progress_update","text":"Run started"}
                data: {"type":"thread.item.done","item":{"type":"widget"}}
        '401':
          description: Unauthorized (missing/invalid OAuth access token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: UNAUTHORIZED
                  message: Authorization header is invalid
                correlation_id: corr_123
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                project_not_found:
                  value:
                    error:
                      code: ERR_PROJECT_NOT_FOUND
                      message: project not found
                    correlation_id: corr_123
                default_workflow_not_found:
                  value:
                    error:
                      code: CHAT_DEFAULT_WORKFLOW_NOT_FOUND
                      message: project default chat workflow is missing or not published
                    correlation_id: corr_123
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: CHAT_DEFAULT_WORKFLOW_NOT_CONFIGURED
                  message: project default chat workflow is not configured
                correlation_id: corr_123
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                tenant_required:
                  value:
                    error:
                      code: ERR_TENANT_REQUIRED
                      message: X-Tenant-Id header is required
                    correlation_id: corr_123
                project_scope_required:
                  value:
                    error:
                      code: CHAT_PROJECT_SCOPE_REQUIRED
                      message: metadata.project_id or X-Project-Id is required when metadata.workflow_id is omitted
                    correlation_id: corr_123
  /chatkit:
    parameters:
      - $ref: '#/components/parameters/TenantIdRequired'
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorrelationId'
    post:
      tags: [chatkit]
      summary: Deprecated ChatKit compatibility alias
      deprecated: true
      description: >
        Temporary compatibility alias for `POST /chat`.
        During transition window this endpoint returns the same payload/SSE contract as
        `POST /chat`, including the same project-centric `threads.create` resolution order
        and typed JSON errors, and emits deprecation lifecycle headers:
        `Deprecation: true`, `Sunset: Sat, 04 Apr 2026 00:00:00 GMT`.
        Starting April 4, 2026 at 00:00 UTC, this endpoint returns `410 Gone`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatKitRequest'
      responses:
        '200':
          description: Same response contract as `POST /chat` during transition window.
          headers:
            Deprecation:
              $ref: '#/components/headers/Deprecation'
            Sunset:
              $ref: '#/components/headers/Sunset'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ChatKitJsonResponse'
                  - $ref: '#/components/schemas/ChatKitTranscriptionResult'
            text/event-stream:
              schema:
                type: string
        '401':
          description: Unauthorized (missing/invalid OAuth access token)
          headers:
            Deprecation:
              $ref: '#/components/headers/Deprecation'
            Sunset:
              $ref: '#/components/headers/Sunset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: UNAUTHORIZED
                  message: Authorization header is invalid
                correlation_id: corr_123
        '404':
          description: Not found (same as `POST /chat`).
          headers:
            Deprecation:
              $ref: '#/components/headers/Deprecation'
            Sunset:
              $ref: '#/components/headers/Sunset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '410':
          description: Deprecated endpoint sunset reached; use `POST /chat`.
          headers:
            Deprecation:
              $ref: '#/components/headers/Deprecation'
            Sunset:
              $ref: '#/components/headers/Sunset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                error:
                  code: DEPRECATED_ENDPOINT
                  message: POST /chatkit is no longer available; use POST /chat
                correlation_id: corr_123
        '422':
          description: Validation error (same as `POST /chat`).
          headers:
            Deprecation:
              $ref: '#/components/headers/Deprecation'
            Sunset:
              $ref: '#/components/headers/Sunset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Conflict (same as `POST /chat`).
          headers:
            Deprecation:
              $ref: '#/components/headers/Deprecation'
            Sunset:
              $ref: '#/components/headers/Sunset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /orchestrator/messages:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [orchestrator]
      summary: Route user message by project orchestrator or direct workflow hints
      description: >
        Unified chat entrypoint. `project_id` is required. If `workflow_id` is provided,
        the API uses direct workflow mode. Otherwise it resolves orchestrator mode using
        `orchestrator_id` or the project's default orchestrator.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestratorMessageRequest'
            examples:
              user_message:
                summary: Standard user message routing
                value:
                  session_id: sess_01
                  user_id: user_01
                  project_id: proj_01
                  message:
                    id: msg_01
                    text: open account
              custom_action:
                summary: Custom action routing with payload materialization
                value:
                  session_id: sess_01
                  user_id: user_01
                  project_id: proj_01
                  message:
                    id: msg_02
                    type: threads.custom_action
                    text: fm_budget_submit_basics
                    payload:
                      income_aed: 26600
                      fixed_costs_aed: 9000
                      currency: AED
      responses:
        '200':
          description: Routed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestratorMessageResponse'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
        '503': { $ref: '#/components/responses/ErrorResponse' }

  /orchestrator/eval/replay:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    post:
      tags: [orchestrator]
      summary: Offline replay/eval for routing quality
      description: >
        Runs read-only routing replay against labeled message cases without starting/resuming/cancelling workflow runs.
        Useful for offline evaluation of routing behavior and quality metrics.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestratorEvalReplayRequest'
      responses:
        '200':
          description: Replay evaluation report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestratorEvalReplayResponse'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
        '503': { $ref: '#/components/responses/ErrorResponse' }

  /orchestrator/sessions/{session_id}/stack:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/ProjectIdQuery'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    get:
      tags: [orchestrator]
      summary: Get workflow run stack for project session
      responses:
        '200':
          description: Session stack
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowStackResponse'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
  /orchestrator/context/get:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    post:
      tags: [orchestrator]
      summary: context.get for thread/session scope
      description: >
        Reads persisted context values for `session` or `thread` scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestratorContextGetRequest'
      responses:
        '200':
          description: Context payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestratorContextResponse'
        '422': { $ref: '#/components/responses/ErrorResponse' }

  /orchestrator/context/set:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [orchestrator]
      summary: context.set for thread/session scope
      description: >
        Writes or updates persisted context values for `session` or `thread` scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestratorContextSetRequest'
      responses:
        '200':
          description: Context payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestratorContextResponse'
        '422': { $ref: '#/components/responses/ErrorResponse' }

  /orchestrator/context/unset:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [orchestrator]
      summary: context.unset for thread/session scope
      description: >
        Deletes selected persisted context keys for `session` or `thread` scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestratorContextUnsetRequest'
      responses:
        '200':
          description: Context payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestratorContextResponse'
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /projects:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    get:
      tags: [projects]
      summary: List projects
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationCursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'
        '400': { $ref: '#/components/responses/ErrorResponse' }
    post:
      tags: [projects]
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
            example:
              project_id: proj_hq21
              project_name: HQ21 Production
              settings:
                orchestrator_enabled: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /projects/{project_id}:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
