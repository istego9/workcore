      required: [title, updated_at, urls, integration_test, integration_manifest, docs, schemas]

    IntegrationAuthProfile:
      type: object
      properties:
        type:
          type: string
          enum: [oauth_client_credentials]
        token_url:
          type: string
        scope:
          type: string
        audience:
          type: string
          nullable: true
        notes:
          type: array
          items: { type: string }
      required: [type, token_url, scope]

    IntegrationProjectScope:
      type: object
      properties:
        tenant_id:
