components:
  securitySchemes:
    oauthClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://login.microsoftonline.com/{tenant_id}/oauth2/v2.0/token
          scopes:
            api://workcore-partner-api/.default: WorkCore API access through APIM gateway.
    entraEasyAuthPrincipal:
      type: apiKey
      in: header
      name: X-MS-CLIENT-PRINCIPAL
      description: Base64-encoded EasyAuth principal header from Microsoft Entra protected frontend.

  headers:
    Deprecation:
      description: >
        Deprecation lifecycle marker for compatibility aliases. Value is `true` when endpoint is deprecated.
      schema:
        type: string
        example: "true"
    Sunset:
      description: HTTP-date when the deprecated endpoint becomes unavailable.
      schema:
        type: string
        example: Sat, 04 Apr 2026 00:00:00 GMT

  parameters:
    WorkflowId:
      in: path
      name: workflow_id
      required: true
      schema: { type: string }
    RunId:
      in: path
      name: run_id
      required: true
      schema: { type: string }
    ArtifactRef:
      in: path
      name: artifact_ref
      required: true
      schema: { type: string }
    SessionId:
      in: path
      name: session_id
      required: true
      schema: { type: string }
    InterruptId:
      in: path
      name: interrupt_id
      required: true
      schema: { type: string }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      schema: { type: string }
      description: Idempotency key for non-safe operations. Re-using the same key within the TTL returns the original response.
    TenantId:
      in: header
      name: X-Tenant-Id
      required: false
      schema: { type: string }
      description: Tenant scope for request processing. Defaults to `local` when omitted.
    TenantIdRequired:
      in: header
      name: X-Tenant-Id
      required: true
      schema: { type: string }
      description: Required tenant scope for strict multi-tenant endpoints.
    CorrelationId:
      in: header
      name: X-Correlation-Id
      required: false
      schema: { type: string }
      description: Correlation identifier echoed in all JSON responses and error envelopes.
    TraceId:
      in: header
      name: X-Trace-Id
      required: false
      schema: { type: string }
      description: Trace identifier propagated to run metadata and runtime events.
    ProjectId:
      in: header
      name: X-Project-Id
      required: false
      schema: { type: string }
      description: Optional project context, merged into run metadata.
    ProjectIdRequired:
      in: header
      name: X-Project-Id
      required: true
      schema: { type: string }
      description: Required project scope for workflow authoring operations.
    ProjectIdPath:
      in: path
      name: project_id
      required: true
      schema: { type: string }
      description: Project scope for project-registry bootstrap endpoints.
    ImportRunId:
      in: header
      name: X-Import-Run-Id
      required: false
      schema: { type: string }
      description: Optional import run identifier, merged into run metadata.
    ProjectIdQuery:
      in: query
      name: project_id
      required: true
      schema: { type: string }
      description: Project scope for orchestrator diagnostics endpoints.
    PaginationLimit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    PaginationCursor:
      in: query
      name: cursor
      required: false
      schema:
        type: string

  responses:
    ErrorResponse:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - INVALID_ARGUMENT
                - NOT_FOUND
                - CONFLICT
                - UNAUTHORIZED
                - FORBIDDEN
                - RATE_LIMITED
                - PRECONDITION_FAILED
                - INTERNAL
                - ERR_PROJECT_ID_REQUIRED
                - ERR_PROJECT_NOT_FOUND
                - ERR_ORCHESTRATOR_NOT_IN_PROJECT
                - ERR_WORKFLOW_NOT_IN_PROJECT
                - ERR_WORKFLOW_ENGINE_UNAVAILABLE
                - ERR_LLM_UNAVAILABLE
                - DEPRECATED_ENDPOINT
                - ERR_LLM_BAD_SCHEMA_OUTPUT
                - ERR_CANCEL_NOT_ALLOWED
                - ERR_CONTEXT_FETCH_FAILED
                - ERR_CAPABILITY_NOT_FOUND
                - ERR_HANDOFF_REPLAY_NOT_ALLOWED
                - ERR_HANDOFF_NOT_FOUND
                - projection.path_invalid
                - artifact.not_found
                - artifact.access_denied
                - artifact.expired
            message: { type: string }
            details:
              oneOf:
                - type: object
                - type: array
                  items: { type: string }
          required: [code, message]
        correlation_id: { type: string }
      required: [error]
      example:
        error:
          code: INVALID_ARGUMENT
          message: "request body must be an object"
        correlation_id: "corr_123"

    PartnerSelfServiceOnboardRequest:
      type: object
      additionalProperties: false
      required:
        - display_name
      properties:
        partner_id:
          type: string
          pattern: '^[a-z0-9][a-z0-9_-]{1,63}$'
          description: Optional stable partner identifier. If omitted, generated from display_name.
        display_name:
          type: string
          minLength: 1
          maxLength: 120
          description: Human-readable partner name.
        tenant_id_pinned:
          type: string
          minLength: 1
          maxLength: 128
          description: Optional tenant identifier enforced by APIM tenant pinning. If omitted, defaults to resolved partner_id.
        entra_app_display_name:
          type: string
          minLength: 1
          maxLength: 120
          description: Optional Entra app registration display name.
        allowed_domains:
          type: array
          items:
            type: string
          description: >
            Optional allowed API hostnames for partner metadata.
            For partner identities containing `epam`, this value is normalized to `["api.runwcr.com"]`.
        rate_limit_profile:
          type: string
          default: default
          description: APIM rate-limit profile identifier.
        secret_expiry_months:
          type: integer
          minimum: 1
          maximum: 24
          default: 12
          description: Partner client secret validity period in months.
        base_url:
          type: string
          description: >
            Primary API base URL written into generated onboarding artifacts.
            If omitted, the default comes from the operator portal/runtime configuration.
            For partner identities containing `epam`, this value is normalized to `https://api.runwcr.com`.

    ChatKitJsonResponse:
      type: object
      additionalProperties: true
      description: Non-streaming ChatKit response payload.

    ChatKitRequest:
      oneOf:
        - $ref: '#/components/schemas/ChatKitThreadCreateRequest'
        - $ref: '#/components/schemas/ChatKitAddUserMessageRequest'
        - $ref: '#/components/schemas/ChatKitCustomActionRequest'
        - $ref: '#/components/schemas/ChatKitInputTranscribeRequest'
      description: Supported ChatKit request types for external clients.

    ChatKitRequestMetadata:
      type: object
      description: >
        Integration metadata forwarded by ChatKit clients.
        For `threads.create`, resolution order is
        `metadata.workflow_id` -> `metadata.project_id` -> `X-Project-Id`.
        `metadata.workflow_id` remains fully backward-compatible, and optional
        `workflow_version_id` still overrides the active published version in explicit mode.
      properties:
        workflow_id: { type: string }
        workflow_version_id: { type: string }
        project_id:
          type: string
          description: >
            Project scope used to resolve the project's configured default chat workflow
            when `workflow_id` is omitted.
        external_user_id: { type: string }
        external_session_id: { type: string }
      additionalProperties: true

    ChatKitThreadCreateRequest:
      type: object
      description: >
        Starts a new thread. A caller may provide either an explicit `metadata.workflow_id`
        or project scope only (`metadata.project_id` or `X-Project-Id`) to resolve the
        project's default chat workflow.
      properties:
        metadata:
          $ref: '#/components/schemas/ChatKitRequestMetadata'
        type:
          type: string
          enum: [threads.create]
        params:
          type: object
          properties:
            input:
              $ref: '#/components/schemas/ChatKitUserInput'
          required: [input]
      required: [type, params]

    ChatKitAddUserMessageRequest:
      type: object
      properties:
        metadata:
          $ref: '#/components/schemas/ChatKitRequestMetadata'
        type:
          type: string
          enum: [threads.add_user_message]
        params:
          type: object
          properties:
            thread_id: { type: string }
            input:
              $ref: '#/components/schemas/ChatKitUserInput'
          required: [thread_id, input]
      required: [type, params]

    ChatKitCustomActionRequest:
      type: object
      properties:
        metadata:
          $ref: '#/components/schemas/ChatKitRequestMetadata'
        type:
          type: string
          enum: [threads.custom_action]
        params:
          type: object
          properties:
            thread_id: { type: string }
            item_id: { type: string, nullable: true }
            action:
              $ref: '#/components/schemas/ChatKitAction'
          required: [thread_id, action]
      required: [type, params]

    ChatKitInputTranscribeRequest:
      type: object
      properties:
        metadata:
          $ref: '#/components/schemas/ChatKitRequestMetadata'
        type:
          type: string
          enum: [input.transcribe]
        params:
          $ref: '#/components/schemas/ChatKitInputTranscribeParams'
      required: [type, params]

    ChatKitInputTranscribeParams:
      type: object
      properties:
        audio_base64:
          type: string
          description: Base64 encoded audio payload.
        mime_type:
          type: string
          description: Audio MIME type, for example `audio/webm;codecs=opus`.
      required: [audio_base64, mime_type]

    ChatKitTranscriptionResult:
      type: object
      description: Non-streaming transcription result for `input.transcribe`.
      properties:
        text: { type: string }
      required: [text]

    ChatKitUserInput:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ChatKitInputContent'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ChatKitAttachmentRef'
        quoted_text:
          type: string
          nullable: true
        inference_options:
          type: object
          additionalProperties: true
      required: [content, attachments]

    ChatKitInputContent:
      oneOf:
        - type: object
          properties:
            type: { type: string, enum: [input_text] }
            text: { type: string }
          required: [type, text]
        - type: object
          properties:
            type: { type: string, enum: [input_tag] }
            text: { type: string }
          required: [type, text]

    ChatKitAttachmentRef:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        mime_type: { type: string }
      additionalProperties: true

    ChatKitAction:
      type: object
      description: >
        Canonical custom action contract for `threads.custom_action`.
        Prefer `action_type` with canonical values. Backward-compatible aliases are accepted via `type`.
        `interrupt.cancel` is accepted by protocol but currently returns an explicit error event in runtime.
      properties:
        action_type:
          type: string
          enum:
            - interrupt.approve
            - interrupt.reject
            - interrupt.submit
            - interrupt.cancel
        type:
          type: string
          description: Backward-compatible alias field mapped to canonical `action_type`.
        payload:
          $ref: '#/components/schemas/ChatKitActionPayload'
      anyOf:
        - required: [action_type]
        - required: [type]

    ChatKitActionPayload:
      type: object
      description: >
        Submit payload is normalized by WorkCore runtime.
        Extraction order: `input` -> `form` -> `form_data` -> `fields` -> fallback top-level keys.
        Wrapper keys are flattened, scalar strings are coerced to native types when safe
        (`true`/`false`, numeric literals, `null`), and `documents` payload passes through unchanged.
      properties:
        action_type:
          type: string
          description: Optional canonical action type override when top-level alias `type` is used.
        run_id: { type: string }
        interrupt_id: { type: string }
        idempotency_key: { type: string }
        action_id: { type: string }
        input: { type: object }
        form: { type: object }
        form_data: { type: object }
        fields: { type: object }
        state_exclude_paths:
          type: array
          description: Optional projection controls validated with the same rules as run start payload.
          items:
            $ref: '#/components/schemas/ProjectionPath'
        output_include_paths:
          type: array
          description: Optional projection controls validated with the same rules as run start payload.
          items:
            $ref: '#/components/schemas/ProjectionPath'
        files:
          type: array
          items: { type: object }
      additionalProperties: true

    ChatKitStreamEvent:
      type: object
      properties:
        type: { type: string }
        thread: { type: object }
        item: { type: object }
        text: { type: string }
        message: { type: string }
        level: { type: string }
        stream_options: { type: object }
      required: [type]
      additionalProperties: true

    OrchestratorUserMessage:
      type: object
      description: >
        Inbound message envelope for `POST /orchestrator/messages`.
        If `type=threads.custom_action`, runtime writes `text` to `inputs.action_type`
        and flattens normalized `payload` fields into `inputs.*`.
      properties:
        id: { type: string }
        type:
          type: string
          enum: [threads.add_user_message, threads.custom_action]
          description: Optional message type. Default behavior is `threads.add_user_message`.
        text:
          type: string
          description: >
            User text for `threads.add_user_message`.
            For `threads.custom_action`, this value is treated as `action_type`.
        payload:
          $ref: '#/components/schemas/OrchestratorCustomActionPayload'
      required: [id, text]

    OrchestratorCustomActionPayload:
      type: object
      description: >
        Optional payload for `message.type=threads.custom_action`.
        Extraction order: `input` -> `form` -> `form_data` -> `fields` -> fallback top-level keys.
        Wrapper keys are flattened, scalar strings are coerced to native types when safe
        (`true`/`false`, numeric literals, `null`), and `documents` payload passes through unchanged.
        Normalized fields are materialized into workflow inputs as `inputs.*`.
      properties:
        input: { type: object }
        form: { type: object }
        form_data: { type: object }
        fields: { type: object }
        state_exclude_paths:
          type: array
          description: Optional projection controls validated with the same rules as run start payload.
          items:
            $ref: '#/components/schemas/ProjectionPath'
        output_include_paths:
          type: array
          description: Optional projection controls validated with the same rules as run start payload.
          items:
            $ref: '#/components/schemas/ProjectionPath'
      additionalProperties: true

    OrchestratorMessageRequest:
      type: object
      description: >
        Unified routing request for direct or orchestrated mode.
        `message.type=threads.custom_action` is additive and optional.
      properties:
        session_id: { type: string }
        user_id: { type: string }
        project_id: { type: string }
        orchestrator_id:
          type: string
          nullable: true
        workflow_id:
          type: string
          nullable: true
        message:
          $ref: '#/components/schemas/OrchestratorUserMessage'
        metadata:
          type: object
          additionalProperties: true
      required: [session_id, user_id, project_id, message]

    RoutingDecision:
      type: object
      properties:
        route_type:
          type: string
          enum:
            - RESUME_CURRENT
            - START_WORKFLOW
            - SWITCH_WORKFLOW
            - DISAMBIGUATE
            - FALLBACK
            - CANCEL
            - OPERATOR
        workflow_id:
          type: string
          nullable: true
        tags:
          type: array
          items: { type: string }
        confidence:
          type: number
          minimum: 0
          maximum: 1
        switch_margin:
          type: number
          minimum: 0
          maximum: 1
        reason_codes:
          type: array
          items:
            type: string
            enum:
              - STOP_INTENT
              - OPERATOR_REQUEST
              - HIGH_CONFIDENCE_MATCH
              - LOW_CONFIDENCE
              - AMBIGUOUS
              - NO_CANDIDATES
              - SWITCH_MARGIN_MET
              - STAY_IN_FLOW
        clarifying_question:
          type: string
          nullable: true
        clarifying_options:
          type: array
          items: { type: string }
      required:
        - route_type
        - workflow_id
        - tags
        - confidence
        - switch_margin
        - reason_codes
        - clarifying_question
        - clarifying_options
      additionalProperties: false

    WorkflowAdapterEvent:
      type: object
      properties:
        type: { type: string }
        payload: { type: object }
      required: [type]

    WorkflowStackItem:
      type: object
      properties:
        run_id: { type: string }
        workflow_id: { type: string }
        status: { type: string }
        transition_reason: { type: string }
        created_at: { type: string, format: date-time }
      required: [run_id, workflow_id, transition_reason]

    OrchestratorResponseMessage:
      type: object
      properties:
        type:
          type: string
          enum: [assistant_message, clarification, system]
        text: { type: string }
        options:
          type: array
          items: { type: string }
      required: [type, text]

    OrchestratorDecisionTraceCandidate:
      type: object
      properties:
        workflow_id: { type: string }
        score:
          type: number
          nullable: true
        reason_codes:
          type: array
          items: { type: string }
      required: [workflow_id, reason_codes]

    OrchestratorDecisionTrace:
      type: object
      properties:
        mode:
          type: string
          enum: [direct, orchestrated]
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/OrchestratorDecisionTraceCandidate'
        selected_action: { type: string }
        selected_workflow_id:
          type: string
          nullable: true
        reason_codes:
          type: array
          items: { type: string }
        selection_reason:
          type: string
        switch_from_workflow_id:
          type: string
          nullable: true
        switch_to_workflow_id:
          type: string
          nullable: true
        switch_reason:
          type: string
          nullable: true
      required: [mode, candidates, selected_action, reason_codes, selection_reason]

    OrchestratorActionError:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        retryable: { type: boolean }
        category:
          type: string
          enum: [route, action]
        action: { type: string }
      required: [code, message, retryable, category, action]

    OrchestratorMessageResponse:
      type: object
      properties:
        decision_id: { type: string }
        mode:
          type: string
          enum: [direct, orchestrated]
        orchestrator_id:
          type: string
          nullable: true
        chosen_action:
          type: string
        chosen_workflow_id:
          type: string
          nullable: true
        run_id:
          type: string
          nullable: true
        active_run_id:
          type: string
          nullable: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
        decision:
          $ref: '#/components/schemas/RoutingDecision'
        decision_trace:
          $ref: '#/components/schemas/OrchestratorDecisionTrace'
        action_error:
          allOf:
            - $ref: '#/components/schemas/OrchestratorActionError'
          nullable: true
        message:
          $ref: '#/components/schemas/OrchestratorResponseMessage'
        events:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowAdapterEvent'
        stack:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStackItem'
        correlation_id: { type: string }
      required: [decision_id, mode, chosen_action, message]

    OrchestratorEvalReplayCase:
      type: object
      properties:
        case_id:
          type: string
          nullable: true
        message_text: { type: string }
        metadata:
          type: object
          additionalProperties: true
        active_workflow_id:
          type: string
          nullable: true
        expected_action:
          type: string
          nullable: true
        expected_workflow_id:
          type: string
          nullable: true
      required: [message_text]

    OrchestratorEvalReplayRequest:
      type: object
      properties:
        project_id: { type: string }
        orchestrator_id:
          type: string
          nullable: true
        session_id:
          type: string
          nullable: true
        user_id:
          type: string
          nullable: true
        cases:
          type: array
          items:
            $ref: '#/components/schemas/OrchestratorEvalReplayCase'
      required: [project_id, cases]

    OrchestratorEvalReplayMetrics:
      type: object
      properties:
        cases_with_expected_action: { type: integer }
        cases_with_expected_workflow: { type: integer }
        cases_with_exact_expectations: { type: integer }
        matched_action: { type: integer }
        matched_workflow_id: { type: integer }
        matched_exact: { type: integer }
        action_accuracy:
          type: number
          nullable: true
        workflow_accuracy:
          type: number
          nullable: true
        exact_match_rate:
          type: number
          nullable: true
        average_confidence: { type: number }
      required:
        - cases_with_expected_action
        - cases_with_expected_workflow
        - cases_with_exact_expectations
        - matched_action
        - matched_workflow_id
        - matched_exact
        - average_confidence

    OrchestratorEvalReplayCaseResult:
      type: object
      properties:
        case_id: { type: string }
        message_text: { type: string }
        expected_action:
          type: string
          nullable: true
        expected_workflow_id:
          type: string
          nullable: true
        chosen_action: { type: string }
        chosen_workflow_id:
          type: string
          nullable: true
        confidence: { type: number }
        decision:
          $ref: '#/components/schemas/RoutingDecision'
        decision_trace:
          $ref: '#/components/schemas/OrchestratorDecisionTrace'
        action_error:
          allOf:
            - $ref: '#/components/schemas/OrchestratorActionError'
          nullable: true
        matched_action:
          type: boolean
          nullable: true
        matched_workflow_id:
          type: boolean
          nullable: true
        matched_exact:
          type: boolean
          nullable: true
        latency_ms: { type: integer }
      required:
        - case_id
        - message_text
        - chosen_action
        - confidence
        - decision
        - decision_trace
        - latency_ms

    OrchestratorEvalReplayResponse:
      type: object
      properties:
        mode:
          type: string
          enum: [offline_eval]
        project_id: { type: string }
        orchestrator_id: { type: string }
        session_id: { type: string }
        user_id: { type: string }
        total_cases: { type: integer }
        metrics:
          $ref: '#/components/schemas/OrchestratorEvalReplayMetrics'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrchestratorEvalReplayCaseResult'
        correlation_id: { type: string }
      required: [mode, project_id, orchestrator_id, session_id, user_id, total_cases, metrics, items]

    WorkflowStackResponse:
      type: object
      properties:
        project_id: { type: string }
        session_id: { type: string }
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStackItem'
        correlation_id: { type: string }
      required: [project_id, session_id, items]

    OrchestratorContextScope:
      type: string
      enum: [session, thread]

    OrchestratorContextGetRequest:
      type: object
      properties:
        scope:
          $ref: '#/components/schemas/OrchestratorContextScope'
        scope_id: { type: string }
        project_id:
          type: string
          nullable: true
        keys:
          type: array
          items: { type: string }
      required: [scope, scope_id]

    OrchestratorContextSetRequest:
      type: object
      properties:
        scope:
          $ref: '#/components/schemas/OrchestratorContextScope'
        scope_id: { type: string }
        project_id:
          type: string
          nullable: true
        values:
          type: object
          additionalProperties: true
      required: [scope, scope_id, values]

    OrchestratorContextUnsetRequest:
      type: object
      properties:
        scope:
          $ref: '#/components/schemas/OrchestratorContextScope'
        scope_id: { type: string }
        project_id:
          type: string
          nullable: true
        keys:
          type: array
          items: { type: string }
      required: [scope, scope_id, keys]

    OrchestratorContextResponse:
      type: object
      properties:
        scope:
          $ref: '#/components/schemas/OrchestratorContextScope'
        scope_id: { type: string }
        project_id:
          type: string
          nullable: true
        context:
          type: object
          additionalProperties: true
        removed_keys:
          type: array
          items: { type: string }
        correlation_id: { type: string }
      required: [scope, scope_id, context]

    ProjectCreateRequest:
      type: object
      properties:
        project_id: { type: string }
        project_name:
          type: string
          description: Human-readable project display name.
        default_orchestrator_id:
          type: string
          nullable: true
        settings:
          $ref: '#/components/schemas/ProjectSettings'
      required: [project_id, project_name]

    ProjectUpdateRequest:
      type: object
      description: >
        Partial project update. Supply at least one of `project_name` or `settings`.
      properties:
        project_name:
          type: string
          description: Human-readable project display name.
        settings:
          $ref: '#/components/schemas/ProjectSettings'

    ProjectSettings:
      type: object
      description: Additive per-project settings bag.
      properties:
        default_chat_workflow_id:
          type: string
          nullable: true
          description: >
            Workflow served by project-scoped `threads.create` requests when the caller
            omits `metadata.workflow_id`. The workflow must belong to the same tenant/project
            scope and have an active published version.
      additionalProperties: true

    Project:
      type: object
      properties:
        project_id:
          type: string
          description: Identifier unique within `tenant_id` scope.
        project_name:
          type: string
          description: Human-readable project display name.
        tenant_id: { type: string }
        default_orchestrator_id:
          type: string
          nullable: true
        settings:
          $ref: '#/components/schemas/ProjectSettings'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [project_id, project_name, tenant_id, settings, created_at, updated_at]

    ProjectList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Project' }
        next_cursor: { type: string, nullable: true }
      required: [items]

    CapabilityContract:
      type: object
      description: Versioned capability contract payload.
      properties:
        inputs: { type: object }
        outputs: { type: object }
        constraints: { type: object }
        timeout_s:
          type: number
          nullable: true
        retry_policy: { type: object }
        error_codes:
          type: array
          items: { type: string }
      additionalProperties: true

    CapabilityCreateRequest:
      type: object
      properties:
        capability_id: { type: string }
        version: { type: string }
        node_type: { type: string }
        contract:
          $ref: '#/components/schemas/CapabilityContract'
      required: [capability_id, version, node_type, contract]

    Capability:
      type: object
      properties:
        capability_id: { type: string }
        version: { type: string }
        node_type: { type: string }
        contract:
          $ref: '#/components/schemas/CapabilityContract'
        created_at: { type: string, format: date-time }
      required: [capability_id, version, node_type, contract, created_at]

    PaginatedCapabilities:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Capability' }
        next_cursor:
          type: string
          nullable: true
      required: [items]

    OrchestratorConfigUpsertRequest:
      type: object
      properties:
        orchestrator_id: { type: string }
        name: { type: string }
        routing_policy:
          $ref: '#/components/schemas/RoutingPolicy'
        fallback_workflow_id:
          type: string
          nullable: true
        prompt_profile:
          type: string
          nullable: true
        set_as_default:
          type: boolean
      required: [orchestrator_id, name]

    OrchestratorConfig:
      type: object
      properties:
        project_id: { type: string }
        orchestrator_id: { type: string }
        name: { type: string }
        routing_policy:
          $ref: '#/components/schemas/RoutingPolicy'
        fallback_workflow_id:
          type: string
          nullable: true
        prompt_profile:
          type: string
          nullable: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [project_id, orchestrator_id, name, routing_policy, created_at, updated_at]

    RoutingPolicy:
      type: object
      properties:
        confidence_threshold:
          type: number
          minimum: 0
          maximum: 1
        switch_margin:
          type: number
          minimum: 0
          maximum: 1
        max_disambiguation_turns:
          type: integer
          minimum: 0
        top_k_candidates:
          type: integer
          minimum: 1
          maximum: 100
        sticky:
          type: boolean
          description: Keep active workflow unless explicit switch intent is detected.
        allow_switch:
          type: boolean
          description: Global switch gate; when false, orchestrator will continue active workflow.
        explicit_switch_only:
          type: boolean
          description: Switch is allowed only when user message explicitly requests switching.
        cooldown_seconds:
          type: integer
          minimum: 0
          description: Minimum seconds between successful workflow switches.
        hysteresis_margin:
          type: number
          minimum: 0
          maximum: 1
          description: Additional margin added to `switch_margin` to reduce route flipping.
      additionalProperties: true

    WorkflowDefinitionUpsertRequest:
      type: object
      properties:
        workflow_id: { type: string }
        name: { type: string }
        description: { type: string }
        tags:
          type: array
          items: { type: string }
        examples:
          type: array
          items: { type: string }
        active: { type: boolean }
        is_fallback: { type: boolean }
      required: [workflow_id, name, description]

    WorkflowDefinition:
      type: object
      properties:
        project_id: { type: string }
        workflow_id: { type: string }
        name: { type: string }
        description: { type: string }
        tags:
          type: array
          items: { type: string }
        examples:
          type: array
          items: { type: string }
        active: { type: boolean }
        is_fallback: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required:
        - project_id
        - workflow_id
        - name
        - description
        - tags
        - examples
        - active
        - is_fallback
        - created_at
        - updated_at

    WorkflowCreateRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        draft:
          $ref: '#/components/schemas/WorkflowDraft'
      required: [name]

    WorkflowUpdateRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string, nullable: true }

    Workflow:
      type: object
      properties:
        workflow_id: { type: string }
        project_id: { type: string }
        name: { type: string }
        description: { type: string }
        draft:
          $ref: '#/components/schemas/WorkflowDraft'
        active_version_id: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [workflow_id, project_id, name]

    WorkflowSummary:
      type: object
      properties:
        workflow_id: { type: string }
        project_id: { type: string }
        name: { type: string }
        description: { type: string }
        active_version_id: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [workflow_id, project_id, name]

    WorkflowList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/WorkflowSummary' }
        next_cursor: { type: string, nullable: true }
      required: [items]

    WorkflowDraft:
      type: object
      properties:
        nodes:
          type: array
          items: { $ref: '#/components/schemas/WorkflowNode' }
        edges:
          type: array
          items: { $ref: '#/components/schemas/WorkflowEdge' }
        variables_schema:
          type: object
      required: [nodes, edges]

    WorkflowNode:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        config:
          type: object
          description: >
            Node-specific config object. For `set_state` nodes, use either legacy
            single assignment fields (`target`, `expression`) or batch
            assignments via `assignments[]`. For `integration_http` nodes configure
            external API call settings and response mapping. Runtime egress policy
            (allowed hosts/schemes/private-network guardrails) is controlled via
            server environment (`INTEGRATION_HTTP_ALLOWED_*`).
          properties:
            target:
              type: string
              description: Legacy set_state target path.
            expression:
              type: string
              description: Legacy set_state expression.
            assignments:
              type: array
              description: Set State batch assignments executed in order.
              items:
                $ref: '#/components/schemas/WorkflowSetStateAssignment'
            capability_id:
              type: string
              description: Optional capability identifier pinned for this node execution.
            capability_version:
              type: string
              description: Optional capability contract version pinned for this node execution.
            url:
              type: string
              description: integration_http endpoint URL.
            method:
              type: string
              enum: [GET, POST, PUT, PATCH, DELETE]
            headers:
              type: object
              additionalProperties: { type: string }
            auth:
              type: object
              properties:
                type: { type: string, enum: [none, bearer, basic] }
                token: { type: string }
                token_env: { type: string }
                username: { type: string }
                password: { type: string }
                username_env: { type: string }
                password_env: { type: string }
              additionalProperties: true
            timeout_s:
              type: number
              minimum: 0.1
            retry_attempts:
              type: integer
              minimum: 0
            retry_backoff_s:
              type: number
              minimum: 0
            request_body_expression:
              type: string
            response_state_target:
              type: string
            response_body_state_target:
              type: string
            fail_on_status:
              type: boolean
            allowed_statuses:
              type: array
              items:
                type: integer
                minimum: 100
                maximum: 599
      required: [id, type]

    WorkflowEdge:
      type: object
      properties:
        source: { type: string }
        target: { type: string }
      required: [source, target]

    WorkflowSetStateAssignment:
      type: object
      properties:
        target: { type: string }
        expression: { type: string }
      required: [target, expression]

    WorkflowVersion:
      type: object
      properties:
        version_id: { type: string }
        workflow_id: { type: string }
        version_number: { type: integer }
        hash: { type: string }
        content: { type: object }
        created_at: { type: string, format: date-time }
      required: [version_id, workflow_id, version_number]

    HandoffPackagePayload:
      type: object
      properties:
        context: { type: object }
        constraints: { type: object }
        expected_result: { type: object }
        acceptance_checks:
          type: array
          items: { type: object }
      required: [context, constraints, expected_result, acceptance_checks]

    HandoffPackageCreateRequest:
      type: object
      properties:
        workflow_id: { type: string }
        version_id: { type: string, nullable: true }
        package:
          $ref: '#/components/schemas/HandoffPackagePayload'
        replay_mode:
          type: string
          enum: [none, deterministic]
        metadata:
          type: object
          properties:
            correlation_id: { type: string }
            tenant_id: { type: string }
            project_id: { type: string }
            import_run_id: { type: string }
            trace_id: { type: string }
            user_id: { type: string }
      required: [workflow_id, package]

    HandoffPackage:
      type: object
      properties:
        handoff_id: { type: string }
        workflow_id: { type: string }
        version_id: { type: string }
        run_id: { type: string, nullable: true }
        replay_mode:
          type: string
          enum: [none, deterministic]
        status: { type: string }
        package:
          $ref: '#/components/schemas/HandoffPackagePayload'
        metadata: { type: object }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [handoff_id, workflow_id, version_id, replay_mode, status, package, created_at, updated_at]

    RunCreateRequest:
      type: object
      properties:
        inputs:
          $ref: '#/components/schemas/RunInputs'
        state_exclude_paths:
          type: array
          description: >
            Optional run projection paths excluded from persisted/returned run state snapshots.
            Dot-delimited syntax; `*` matches a single path segment.
          items:
            $ref: '#/components/schemas/ProjectionPath'
        output_include_paths:
          type: array
          description: >
            Optional allowlist of output paths returned from run payloads.
            Dot-delimited syntax; `*` matches a single path segment.
          items:
            $ref: '#/components/schemas/ProjectionPath'
        version_id: { type: string }
        metadata:
          type: object
          properties:
            correlation_id: { type: string }
            tenant_id: { type: string }
            project_id: { type: string }
            import_run_id: { type: string }
            trace_id: { type: string }
            user_id: { type: string }
          required: [tenant_id, project_id, import_run_id, trace_id]
        mode:
          type: string
          enum: [live, test, sync, async]
      required: [inputs]

    Run:
      type: object
      properties:
        run_id: { type: string }
        workflow_id: { type: string }
        version_id: { type: string }
        resolved_version: { type: string }
        status: { type: string }
        mode: { type: string }
        inputs:
          $ref: '#/components/schemas/RunInputs'
        state:
          type: object
          description: Run state payload after applying configured state projection rules.
        outputs:
          type: object
          description: Run outputs payload after applying configured output projection rules.
        metadata:
          type: object
          properties:
            correlation_id: { type: string }
            tenant_id: { type: string }
            project_id: { type: string }
            session_id: { type: string }
            import_run_id: { type: string }
            trace_id: { type: string }
            user_id: { type: string }
        correlation_id: { type: string }
        trace_id: { type: string }
        tenant_id: { type: string }
        project_id: { type: string }
        session_id: { type: string }
        import_run_id: { type: string }
        cancellable: { type: boolean }
        commit_point_reached: { type: boolean }
        error:
          type: string
          nullable: true
          description: Backward-compatible top-level failure message mirrored from failed node diagnostics.
        last_error:
          type: string
          nullable: true
          description: Alias of `error` for clients expecting legacy run-level failure fields.
        failed_node_id:
          type: string
          nullable: true
          description: Node id selected as failure source for run-level diagnostics.
        node_runs:
          type: array
          items: { $ref: '#/components/schemas/NodeRun' }
        node_states:
          type: array
          description: Backward-compatible alias of `node_runs`.
          items: { $ref: '#/components/schemas/NodeRun' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [run_id, workflow_id, version_id, status]

    ArtifactReadResponse:
      type: object
      properties:
        artifact_ref: { type: string }
        mime_type: { type: string, nullable: true }
        metadata:
          type: object
          additionalProperties: true
        content:
          description: Artifact payload returned on explicit fetch.
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time, nullable: true }
        correlation_id: { type: string }
      required: [artifact_ref, metadata, content, created_at]

    NodeRun:
      type: object
      properties:
        node_id: { type: string }
        status: { type: string }
        attempt: { type: integer }
        output: { type: object }
        last_error: { type: object }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
      required: [node_id, status]

    Interrupt:
      type: object
      properties:
        interrupt_id: { type: string }
        run_id: { type: string }
        node_id: { type: string }
        type: { type: string }
        status: { type: string }
        prompt: { type: string }
        input_schema: { type: object }
        allow_file_upload: { type: boolean }
        input: { type: object }
        files: { type: array, items: { type: object } }
        expires_at: { type: string, format: date-time }
      required: [interrupt_id, run_id, node_id, status]

    InterruptResumeRequest:
      type: object
      properties:
        input: { type: object }
        files: { type: array, items: { type: object } }

    RerunNodeRequest:
      type: object
      properties:
        node_id: { type: string }
        scope: { type: string, enum: [node_only, downstream] }
      required: [node_id, scope]

    InboundWebhookRequest:
      type: object
      properties:
        action:
          type: string
          enum: [start_run, resume_interrupt]
        workflow_id: { type: string }
        version_id: { type: string }
        run_id: { type: string }
        interrupt_id: { type: string }
        inputs:
          $ref: '#/components/schemas/RunInputs'
      required: [action]

    ProjectionPath:
      type: string
      description: Dot-delimited path expression used by run projections.
      example: documents.pages.image_base64

    RunInputDocumentPage:
      type: object
      description: >
        Document page payload. `artifact_ref` is the preferred content carrier.
        Inline fields remain supported for compatibility during migration.
      properties:
        page_number: { type: integer }
        mime_type: { type: string }
        artifact_ref:
          type: string
          description: Opaque artifact handle resolved via explicit artifact read operation.
        text: { type: string }
        ocr_text: { type: string }
        markdown: { type: string }
        image_base64: { type: string }

    RunInputDocument:
      type: object
      properties:
        doc_id: { type: string }
        filename: { type: string }
        type: { type: string }
        mime_type: { type: string }
        pages:
          type: array
          items:
            $ref: '#/components/schemas/RunInputDocumentPage'

    RunInputs:
      type: object
      description: >
        Run input object. For document workflows, use `documents[].pages[].artifact_ref`
        by default and fetch full content explicitly when required.
      properties:
        documents:
          type: array
          items:
            $ref: '#/components/schemas/RunInputDocument'
      additionalProperties: true

    WebhookSubscription:
      type: object
      properties:
        subscription_id: { type: string }
        url: { type: string }
        event_types:
          type: array
          items: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
      required: [subscription_id, url, event_types]

    WebhookSubscriptionCreateRequest:
      type: object
      properties:
        url: { type: string }
        event_types:
          type: array
          items: { type: string }
      required: [url, event_types]

    PaginatedRuns:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Run' }
        next_cursor:
          type: string
          nullable: true
      required: [items]

    RunLedgerEntry:
      type: object
      properties:
        ledger_id: { type: string }
        run_id: { type: string }
        workflow_id: { type: string }
        version_id: { type: string }
        step_id: { type: string, nullable: true }
        node_id:
          type: string
          nullable: true
          description: Backward-compatible alias of `step_id`.
        capability_id: { type: string, nullable: true }
        capability_version: { type: string, nullable: true }
        status: { type: string }
        event_type: { type: string }
        decision: { type: object, nullable: true }
        artifacts:
          type: array
          items: { type: string }
        payload: { type: object }
        timestamp: { type: string, format: date-time }
      required: [ledger_id, run_id, workflow_id, version_id, status, event_type, artifacts, payload, timestamp]

    PaginatedRunLedger:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/RunLedgerEntry' }
        next_cursor:
          type: string
          nullable: true
      required: [items]

    PaginatedWorkflowVersions:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/WorkflowVersion' }
        next_cursor:
          type: string
          nullable: true
      required: [items]

    PaginatedWebhookSubscriptions:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/WebhookSubscription' }
        next_cursor:
          type: string
          nullable: true
      required: [items]

    Event:
      type: object
      properties:
        event_id: { type: string }
        type: { type: string }
        run_id: { type: string }
        workflow_id: { type: string }
        version_id: { type: string }
        node_id: { type: string }
        sequence: { type: integer }
        correlation_id: { type: string }
        trace_id: { type: string }
        tenant_id: { type: string }
        project_id: { type: string }
        import_run_id: { type: string }
        payload: { type: object }
        timestamp: { type: string, format: date-time }
      required: [event_id, type, run_id, workflow_id, version_id, sequence]

    AgentIntegrationKit:
      type: object
      properties:
        title: { type: string }
        updated_at: { type: string, format: date-time }
        correlation_id: { type: string }
        urls:
          type: object
          properties:
            integration_kit_markdown: { type: string, format: uri }
            integration_kit_json: { type: string, format: uri }
            integration_test_ui: { type: string, format: uri }
            integration_test_json: { type: string, format: uri }
            integration_logs: { type: string, format: uri }
            validate_draft: { type: string, format: uri }
            openapi: { type: string, format: uri }
            api_reference: { type: string, format: uri }
            workflow_authoring_guide: { type: string, format: uri }
            workflow_draft_schema: { type: string, format: uri }
            workflow_export_schema: { type: string, format: uri }
            routing_decision_schema: { type: string, format: uri }
            projects_create: { type: string, format: uri }
            capabilities_create: { type: string, format: uri }
            capabilities_versions_template: { type: string }
            project_orchestrator_upsert_template: { type: string }
            project_workflow_definition_upsert_template: { type: string }
            chat_endpoint: { type: string, format: uri }
            orchestrator_message: { type: string, format: uri }
            orchestrator_stack_template: { type: string }
            orchestrator_context_get: { type: string, format: uri }
            orchestrator_context_set: { type: string, format: uri }
            orchestrator_context_unset: { type: string, format: uri }
            handoff_create: { type: string, format: uri }
            handoff_replay_template: { type: string }
            run_ledger_template: { type: string }
            partner_access_portal: { type: string, format: uri }
            partner_onboard_package: { type: string, format: uri }
        integration_test:
