openapi: 3.0.3
info:
  title: Workflow Platform API
  version: 0.13.0
  description: >
    MVP+ API for workflows, runs, interrupts, streaming, and webhooks with transparent run metadata propagation.
    Project orchestration mode supports intent routing, disambiguation, workflow switching, and direct workflow start.
    WorkCore runtime profiles should set `WORKCORE_API_AUTH_TOKEN` and `WEBHOOK_DEFAULT_INBOUND_SECRET`.
    API requests (except `/health` and signed inbound webhooks) must include `Authorization: Bearer <token>`.
servers:
  - url: https://api.example.com

security:
  - bearerAuth: []

tags:
  - name: projects
  - name: workflows
  - name: capabilities
  - name: runs
  - name: handoff
  - name: interrupts
  - name: streaming
  - name: webhooks
  - name: chatkit
  - name: orchestrator

paths:
  /openapi.yaml:
    get:
      tags: [workflows]
      summary: OpenAPI contract
      security: []
      responses:
        '200':
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string
  /api-reference:
    get:
      tags: [workflows]
      summary: Human-readable API reference
      security: []
      responses:
        '200':
          description: API reference in Markdown
          content:
            text/markdown:
              schema:
                type: string
  /workflow-authoring-guide:
    get:
      tags: [workflows]
      summary: Workflow authoring guide for agents
      security: []
      responses:
        '200':
          description: Workflow authoring guide in Markdown
          content:
            text/markdown:
              schema:
                type: string
  /schemas/workflow-draft.schema.json:
    get:
      tags: [workflows]
      summary: JSON Schema for workflow draft payloads
      security: []
      responses:
        '200':
          description: JSON Schema document
          content:
            application/json:
              schema:
                type: object
  /schemas/workflow-export-v1.schema.json:
    get:
      tags: [workflows]
      summary: JSON Schema for workflow export v1 payloads
      security: []
      responses:
        '200':
          description: JSON Schema document
          content:
            application/json:
              schema:
                type: object
  /schemas/routing-decision.schema.json:
    get:
      tags: [orchestrator]
      summary: JSON Schema for strict orchestrator routing decisions
      security: []
      responses:
        '200':
          description: JSON Schema document
          content:
            application/json:
              schema:
                type: object
  /agent-integration-kit:
    get:
      tags: [workflows]
      summary: Integration kit for external agents (Markdown)
      security: []
      responses:
        '200':
          description: Integration kit with all required resource links
          content:
            text/markdown:
              schema:
                type: string
  /agent-integration-kit.json:
    get:
      tags: [workflows]
      summary: Integration kit for external agents (JSON bundle)
      security: []
      responses:
        '200':
          description: Machine-readable integration bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentIntegrationKit'
  /agent-integration-test:
    get:
      tags: [workflows]
      summary: Interactive integration test UI for external agents
      security: []
      responses:
        '200':
          description: HTML page with integration checks and draft validator
          content:
            text/html:
              schema:
                type: string
  /agent-integration-test.json:
    get:
      tags: [workflows]
      summary: Integration readiness test report
      security: []
      responses:
        '200':
          description: Integration check report with PASS/FAIL summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentIntegrationCheckReport'
  /agent-integration-test/validate-draft:
    post:
      tags: [workflows]
      summary: Validate workflow draft against runtime publish rules
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                draft:
                  $ref: '#/components/schemas/WorkflowDraft'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDraftValidationResult'
  /agent-integration-logs:
    get:
      tags: [workflows]
      summary: Detailed integration logs for external agents
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - in: query
          name: correlation_id
          required: false
          schema:
            type: string
        - in: query
          name: trace_id
          required: false
          schema:
            type: string
        - in: query
          name: event
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Filtered integration log report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentIntegrationLogReport'
        '401': { $ref: '#/components/responses/ErrorResponse' }
  /chatkit:
    parameters:
      - $ref: '#/components/parameters/TenantIdRequired'
    post:
      tags: [chatkit]
      summary: ChatKit advanced integration endpoint
      description: >
        Handles ChatKit thread/message/action requests for external clients.
        Strict multi-tenant mode requires `X-Tenant-Id` on every request.
        For interactive operations (`threads.create`, `threads.add_user_message`, `threads.custom_action`)
        the response is streamed as SSE where each `data:` line is a JSON ChatKit stream event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatKitRequest'
            examples:
              thread_create:
                summary: Create thread and start run
                value:
                  metadata:
                    workflow_id: wf_chat
                    workflow_version_id: v1
                    external_user_id: user_42
                    external_session_id: session_abc
                  type: threads.create
                  params:
                    input:
                      content:
                        - type: input_text
                          text: start
                      attachments: []
                      inference_options: {}
              add_user_message:
                summary: Continue existing thread with a user message
                value:
                  metadata:
                    external_user_id: user_42
                    external_session_id: session_abc
                  type: threads.add_user_message
                  params:
                    thread_id: thr_01
                    input:
                      content:
                        - type: input_text
                          text: please continue
                      attachments: []
                      inference_options: {}
              interrupt_action:
                summary: Approve interrupt from widget/action button
                value:
                  metadata:
                    external_user_id: user_42
                    external_session_id: session_abc
                  type: threads.custom_action
                  params:
                    thread_id: thr_01
                    item_id: null
                    action:
                      action_type: interrupt.approve
                      payload:
                        run_id: run_01
                        interrupt_id: intr_01
                        idempotency_key: action_approve_01
      responses:
        '200':
          description: >
            ChatKit response (JSON or SSE stream). For stream responses each `data:` line
            is a JSON object matching `ChatKitStreamEvent`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatKitJsonResponse'
            text/event-stream:
              schema:
                type: string
              example: |
                data: {"type":"thread.created","thread":{"id":"thr_01"}}
                data: {"type":"progress_update","text":"Run started"}
                data: {"type":"thread.item.done","item":{"type":"widget"}}
        '401':
          description: Unauthorized (when CHATKIT_AUTH_TOKEN is configured and missing/invalid)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /orchestrator/messages:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [orchestrator]
      summary: Route user message by project orchestrator or direct workflow hints
      description: >
        Unified chat entrypoint. `project_id` is required. If `workflow_id` is provided,
        the API uses direct workflow mode. Otherwise it resolves orchestrator mode using
        `orchestrator_id` or the project's default orchestrator.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestratorMessageRequest'
      responses:
        '200':
          description: Routed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestratorMessageResponse'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
        '503': { $ref: '#/components/responses/ErrorResponse' }

  /orchestrator/sessions/{session_id}/stack:
    parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/ProjectIdQuery'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    get:
      tags: [orchestrator]
      summary: Get workflow run stack for project session
      responses:
        '200':
          description: Session stack
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowStackResponse'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
  /orchestrator/context/get:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    post:
      tags: [orchestrator]
      summary: context.get for thread/session scope
      description: >
        Reads persisted context values for `session` or `thread` scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestratorContextGetRequest'
      responses:
        '200':
          description: Context payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestratorContextResponse'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }

  /orchestrator/context/set:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [orchestrator]
      summary: context.set for thread/session scope
      description: >
        Writes or updates persisted context values for `session` or `thread` scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestratorContextSetRequest'
      responses:
        '200':
          description: Context payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestratorContextResponse'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }

  /orchestrator/context/unset:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [orchestrator]
      summary: context.unset for thread/session scope
      description: >
        Deletes selected persisted context keys for `session` or `thread` scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestratorContextUnsetRequest'
      responses:
        '200':
          description: Context payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestratorContextResponse'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /projects:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    get:
      tags: [projects]
      summary: List projects
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationCursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'
        '400': { $ref: '#/components/responses/ErrorResponse' }
    post:
      tags: [projects]
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
            example:
              project_id: proj_hq21
              project_name: HQ21 Production
              settings:
                orchestrator_enabled: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /projects/{project_id}:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    patch:
      tags: [projects]
      summary: Update project metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateRequest'
            example:
              project_name: HQ21 Production
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
    delete:
      tags: [projects]
      summary: Delete project
      description: Deletes a tenant-scoped project if it has no workflows.
      responses:
        '204':
          description: Deleted
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /projects/{project_id}/orchestrators:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    post:
      tags: [projects]
      summary: Upsert project orchestrator configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestratorConfigUpsertRequest'
            example:
              orchestrator_id: orc_default
              name: Default orchestrator
              routing_policy:
                confidence_threshold: 0.6
                switch_margin: 0.2
                max_disambiguation_turns: 2
                top_k_candidates: 10
              fallback_workflow_id: wf_fallback
              prompt_profile: default
              set_as_default: true
      responses:
        '201':
          description: Created/updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestratorConfig'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /projects/{project_id}/workflow-definitions:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    post:
      tags: [projects]
      summary: Upsert project workflow definition for routing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowDefinitionUpsertRequest'
            example:
              workflow_id: wf_91ca7892
              name: Future bank demo
              description: Handles onboarding flow
              tags: [banking, onboarding]
              examples: [open account, start onboarding]
              active: true
              is_fallback: false
      responses:
        '201':
          description: Created/updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinition'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /capabilities:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    post:
      tags: [capabilities]
      summary: Register versioned capability contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapabilityCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Capability'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
    get:
      tags: [capabilities]
      summary: List capability versions
      parameters:
        - in: query
          name: capability_id
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCapabilities'
  /capabilities/{capability_id}/versions:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - in: path
        name: capability_id
        required: true
        schema: { type: string }
    get:
      tags: [capabilities]
      summary: List versions for capability id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCapabilities'
  /workflows:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/ProjectIdRequired'
    get:
      tags: [workflows]
      summary: List workflows
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationCursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowList'
        '422': { $ref: '#/components/responses/ErrorResponse' }
    post:
      tags: [workflows]
      summary: Create workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowCreateRequest'
            example:
              name: Order triage
              description: Classify customer intent and route
              draft:
                nodes:
                  - id: start
                    type: start
                  - id: end
                    type: end
                edges:
                  - source: start
                    target: end
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /workflows/{workflow_id}:
    parameters:
      - $ref: '#/components/parameters/WorkflowId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/ProjectIdRequired'
    patch:
      tags: [workflows]
      summary: Update workflow metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowUpdateRequest'
            example:
              name: Order triage v2
              description: Updated description
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
    get:
      tags: [workflows]
      summary: Get workflow
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
    delete:
      tags: [workflows]
      summary: Delete workflow
      responses:
        '204':
          description: Deleted
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /workflows/{workflow_id}/draft:
    parameters:
      - $ref: '#/components/parameters/WorkflowId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/ProjectIdRequired'
    put:
      tags: [workflows]
      summary: Update workflow draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowDraft'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /workflows/{workflow_id}/publish:
    parameters:
      - $ref: '#/components/parameters/WorkflowId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/ProjectIdRequired'
    post:
      tags: [workflows]
      summary: Publish workflow
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowVersion'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /workflows/{workflow_id}/rollback:
    parameters:
      - $ref: '#/components/parameters/WorkflowId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/ProjectIdRequired'
    post:
      tags: [workflows]
      summary: Rollback draft to active published version
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /workflows/{workflow_id}/versions:
    parameters:
      - $ref: '#/components/parameters/WorkflowId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/ProjectIdRequired'
    get:
      tags: [workflows]
      summary: List published versions
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationCursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWorkflowVersions'
        '422': { $ref: '#/components/responses/ErrorResponse' }

  /workflows/{workflow_id}/runs:
    parameters:
      - $ref: '#/components/parameters/WorkflowId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/ImportRunId'
    post:
      tags: [runs]
      summary: Start a run
      description: >
        Project scope must be provided via `X-Project-Id` header or `metadata.project_id`.
        For document workflows, prefer `documents[].pages[].artifact_ref` over inline payloads;
        use run projections (`state_exclude_paths`, `output_include_paths`) to reduce persisted and returned payload size.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCreateRequest'
            example:
              inputs:
                customer_text: "I want a refund"
                documents:
                  - doc_id: doc_1
                    filename: claim-photo-1.jpg
                    type: image
                    pages:
                      - page_number: 1
                        mime_type: image/jpeg
                        artifact_ref: artf_tenant_a_01
              state_exclude_paths:
                - documents
                - documents.pages.image_base64
              output_include_paths:
                - result.claim_id
                - result.decision
              metadata:
                correlation_id: corr_123
                user_id: user_1
                tenant_id: tenant_a
              mode: async
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }

  /runs/{run_id}:
    parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    get:
      tags: [runs]
      summary: Get run
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /runs:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    get:
      tags: [runs]
      summary: List runs
      parameters:
        - in: query
          name: workflow_id
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationCursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRuns'

  /artifacts/{artifact_ref}:
    parameters:
      - $ref: '#/components/parameters/ArtifactRef'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    get:
      tags: [runs]
      summary: Read artifact content explicitly by reference
      description: >
        Returns artifact payload on explicit fetch. Use this endpoint to load full content
        when run input/state/output uses artifact references by default.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactReadResponse'
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '410': { $ref: '#/components/responses/ErrorResponse' }

  /runs/{run_id}/ledger:
    parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    get:
      tags: [runs]
      summary: List immutable run ledger entries
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 1000, default: 200 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRunLedger'

  /handoff/packages:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [handoff]
      summary: Atomic workflow handoff package intake
      description: >
        Atomically receives a workflow handoff package (context, constraints, expected result,
        acceptance checks), starts run execution, and returns handoff+run linkage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HandoffPackageCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandoffPackage'
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }

  /handoff/packages/{handoff_id}/replay:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      - in: path
        name: handoff_id
        required: true
        schema: { type: string }
    post:
      tags: [handoff]
      summary: Deterministic replay from stored handoff package
      responses:
        '200':
          description: Replay started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandoffPackage'
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /runs/{run_id}/cancel:
    parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    post:
      tags: [runs]
      summary: Cancel run
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'

  /runs/{run_id}/rerun-node:
    parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    post:
      tags: [runs]
      summary: Rerun node
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RerunNodeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'

  /runs/{run_id}/stream:
    parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    get:
      tags: [streaming]
      summary: SSE stream for run progress
      parameters:
        - in: header
          name: Last-Event-ID
          schema: { type: string }
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string

  /runs/{run_id}/interrupts/{interrupt_id}/resume:
    parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/InterruptId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    post:
      tags: [interrupts]
      summary: Resume interrupt
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterruptResumeRequest'
            example:
              input:
                approved: true
              files: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'

  /runs/{run_id}/interrupts/{interrupt_id}/cancel:
    parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/InterruptId'
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    post:
      tags: [interrupts]
      summary: Cancel interrupt
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Interrupt'

  /webhooks/inbound/{integration_key}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    post:
      tags: [webhooks]
      summary: Inbound webhook trigger
      description: Requires a valid webhook signature (`X-Webhook-Timestamp`, `X-Webhook-Signature`).
      security: []
      parameters:
        - in: path
          name: integration_key
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboundWebhookRequest'
            example:
              action: start_run
              workflow_id: wf_123
              inputs:
                customer_text: "I need help with my order"
      responses:
        '202':
          description: Accepted

  /webhooks/outbound:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    get:
      tags: [webhooks]
      summary: List outbound webhooks
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationCursor'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWebhookSubscriptions'
    post:
      tags: [webhooks]
      summary: Register outbound webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookSubscriptionCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscription'

  /webhooks/outbound/{subscription_id}:
    parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/TraceId'
    delete:
      tags: [webhooks]
      summary: Delete outbound webhook
      parameters:
        - in: path
          name: subscription_id
          required: true
          schema: { type: string }
      responses:
        '204':
          description: No Content

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    WorkflowId:
      in: path
      name: workflow_id
      required: true
      schema: { type: string }
    RunId:
      in: path
      name: run_id
      required: true
      schema: { type: string }
    ArtifactRef:
      in: path
      name: artifact_ref
      required: true
      schema: { type: string }
    SessionId:
      in: path
      name: session_id
      required: true
      schema: { type: string }
    InterruptId:
      in: path
      name: interrupt_id
      required: true
      schema: { type: string }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      schema: { type: string }
      description: Idempotency key for non-safe operations. Re-using the same key within the TTL returns the original response.
    TenantId:
      in: header
      name: X-Tenant-Id
      required: false
      schema: { type: string }
      description: Tenant scope for request processing. Defaults to `local` when omitted.
    TenantIdRequired:
      in: header
      name: X-Tenant-Id
      required: true
      schema: { type: string }
      description: Required tenant scope for strict multi-tenant endpoints.
    CorrelationId:
      in: header
      name: X-Correlation-Id
      required: false
      schema: { type: string }
      description: Correlation identifier echoed in all JSON responses and error envelopes.
    TraceId:
      in: header
      name: X-Trace-Id
      required: false
      schema: { type: string }
      description: Trace identifier propagated to run metadata and runtime events.
    ProjectId:
      in: header
      name: X-Project-Id
      required: false
      schema: { type: string }
      description: Optional project context, merged into run metadata.
    ProjectIdRequired:
      in: header
      name: X-Project-Id
      required: true
      schema: { type: string }
      description: Required project scope for workflow authoring operations.
    ProjectIdPath:
      in: path
      name: project_id
      required: true
      schema: { type: string }
      description: Project scope for project-registry bootstrap endpoints.
    ImportRunId:
      in: header
      name: X-Import-Run-Id
      required: false
      schema: { type: string }
      description: Optional import run identifier, merged into run metadata.
    ProjectIdQuery:
      in: query
      name: project_id
      required: true
      schema: { type: string }
      description: Project scope for orchestrator diagnostics endpoints.
    PaginationLimit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    PaginationCursor:
      in: query
      name: cursor
      required: false
      schema:
        type: string

  responses:
    ErrorResponse:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - INVALID_ARGUMENT
                - NOT_FOUND
                - CONFLICT
                - UNAUTHORIZED
                - FORBIDDEN
                - RATE_LIMITED
                - PRECONDITION_FAILED
                - INTERNAL
                - ERR_PROJECT_ID_REQUIRED
                - ERR_PROJECT_NOT_FOUND
                - ERR_ORCHESTRATOR_NOT_IN_PROJECT
                - ERR_WORKFLOW_NOT_IN_PROJECT
                - ERR_WORKFLOW_ENGINE_UNAVAILABLE
                - ERR_LLM_UNAVAILABLE
                - ERR_LLM_BAD_SCHEMA_OUTPUT
                - ERR_CANCEL_NOT_ALLOWED
                - ERR_CONTEXT_FETCH_FAILED
                - ERR_CAPABILITY_NOT_FOUND
                - ERR_HANDOFF_REPLAY_NOT_ALLOWED
                - ERR_HANDOFF_NOT_FOUND
                - projection.path_invalid
                - artifact.not_found
                - artifact.access_denied
                - artifact.expired
            message: { type: string }
            details:
              oneOf:
                - type: object
                - type: array
                  items: { type: string }
          required: [code, message]
        correlation_id: { type: string }
      required: [error]
      example:
        error:
          code: INVALID_ARGUMENT
          message: "workflow_id is required"
        correlation_id: "corr_123"

    ChatKitJsonResponse:
      type: object
      additionalProperties: true
      description: Non-streaming ChatKit response payload.

    ChatKitRequest:
      oneOf:
        - $ref: '#/components/schemas/ChatKitThreadCreateRequest'
        - $ref: '#/components/schemas/ChatKitAddUserMessageRequest'
        - $ref: '#/components/schemas/ChatKitCustomActionRequest'
      description: Supported interactive ChatKit request types for external clients.

    ChatKitRequestMetadata:
      type: object
      description: >
        Integration metadata forwarded by ChatKit clients.
        `workflow_id` (and optional `workflow_version_id`) is required on `threads.create`
        to bind a new thread to a workflow run.
      properties:
        workflow_id: { type: string }
        workflow_version_id: { type: string }
        external_user_id: { type: string }
        external_session_id: { type: string }
      additionalProperties: true

    ChatKitThreadCreateRequest:
      type: object
      properties:
        metadata:
          allOf:
            - $ref: '#/components/schemas/ChatKitRequestMetadata'
            - type: object
              required: [workflow_id]
        type:
          type: string
          enum: [threads.create]
        params:
          type: object
          properties:
            input:
              $ref: '#/components/schemas/ChatKitUserInput'
          required: [input]
      required: [type, params]

    ChatKitAddUserMessageRequest:
      type: object
      properties:
        metadata:
          $ref: '#/components/schemas/ChatKitRequestMetadata'
        type:
          type: string
          enum: [threads.add_user_message]
        params:
          type: object
          properties:
            thread_id: { type: string }
            input:
              $ref: '#/components/schemas/ChatKitUserInput'
          required: [thread_id, input]
      required: [type, params]

    ChatKitCustomActionRequest:
      type: object
      properties:
        metadata:
          $ref: '#/components/schemas/ChatKitRequestMetadata'
        type:
          type: string
          enum: [threads.custom_action]
        params:
          type: object
          properties:
            thread_id: { type: string }
            item_id: { type: string, nullable: true }
            action:
              $ref: '#/components/schemas/ChatKitAction'
          required: [thread_id, action]
      required: [type, params]

    ChatKitUserInput:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ChatKitInputContent'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ChatKitAttachmentRef'
        quoted_text:
          type: string
          nullable: true
        inference_options:
          type: object
          additionalProperties: true
      required: [content, attachments]

    ChatKitInputContent:
      oneOf:
        - type: object
          properties:
            type: { type: string, enum: [input_text] }
            text: { type: string }
          required: [type, text]
        - type: object
          properties:
            type: { type: string, enum: [input_tag] }
            text: { type: string }
          required: [type, text]

    ChatKitAttachmentRef:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        mime_type: { type: string }
      additionalProperties: true

    ChatKitAction:
      type: object
      description: >
        Canonical custom action contract for `threads.custom_action`.
        Prefer `action_type` with canonical values. Backward-compatible aliases are accepted via `type`.
        `interrupt.cancel` is accepted by protocol but currently returns an explicit error event in runtime.
      properties:
        action_type:
          type: string
          enum:
            - interrupt.approve
            - interrupt.reject
            - interrupt.submit
            - interrupt.cancel
        type:
          type: string
          description: Backward-compatible alias field mapped to canonical `action_type`.
        payload:
          $ref: '#/components/schemas/ChatKitActionPayload'
      anyOf:
        - required: [action_type]
        - required: [type]

    ChatKitActionPayload:
      type: object
      description: >
        Submit payload is normalized by WorkCore runtime.
        Extraction order: `input` -> `form` -> `form_data` -> `fields` -> fallback top-level keys.
        Wrapper keys are flattened, scalar strings are coerced to native types when safe
        (`true`/`false`, numeric literals, `null`), and `documents` payload passes through unchanged.
      properties:
        action_type:
          type: string
          description: Optional canonical action type override when top-level alias `type` is used.
        run_id: { type: string }
        interrupt_id: { type: string }
        idempotency_key: { type: string }
        action_id: { type: string }
        input: { type: object }
        form: { type: object }
        form_data: { type: object }
        fields: { type: object }
        state_exclude_paths:
          type: array
          description: Optional projection controls validated with the same rules as run start payload.
          items:
            $ref: '#/components/schemas/ProjectionPath'
        output_include_paths:
          type: array
          description: Optional projection controls validated with the same rules as run start payload.
          items:
            $ref: '#/components/schemas/ProjectionPath'
        files:
          type: array
          items: { type: object }
      additionalProperties: true

    ChatKitStreamEvent:
      type: object
      properties:
        type: { type: string }
        thread: { type: object }
        item: { type: object }
        text: { type: string }
        message: { type: string }
        level: { type: string }
        stream_options: { type: object }
      required: [type]
      additionalProperties: true

    OrchestratorUserMessage:
      type: object
      properties:
        id: { type: string }
        text: { type: string }
      required: [id, text]

    OrchestratorMessageRequest:
      type: object
      properties:
        session_id: { type: string }
        user_id: { type: string }
        project_id: { type: string }
        orchestrator_id:
          type: string
          nullable: true
        workflow_id:
          type: string
          nullable: true
        message:
          $ref: '#/components/schemas/OrchestratorUserMessage'
        metadata:
          type: object
          additionalProperties: true
      required: [session_id, user_id, project_id, message]

    RoutingDecision:
      type: object
      properties:
        route_type:
          type: string
          enum:
            - RESUME_CURRENT
            - START_WORKFLOW
            - SWITCH_WORKFLOW
            - DISAMBIGUATE
            - FALLBACK
            - CANCEL
            - OPERATOR
        workflow_id:
          type: string
          nullable: true
        tags:
          type: array
          items: { type: string }
        confidence:
          type: number
          minimum: 0
          maximum: 1
        switch_margin:
          type: number
          minimum: 0
          maximum: 1
        reason_codes:
          type: array
          items:
            type: string
            enum:
              - STOP_INTENT
              - OPERATOR_REQUEST
              - HIGH_CONFIDENCE_MATCH
              - LOW_CONFIDENCE
              - AMBIGUOUS
              - NO_CANDIDATES
              - SWITCH_MARGIN_MET
              - STAY_IN_FLOW
        clarifying_question:
          type: string
          nullable: true
        clarifying_options:
          type: array
          items: { type: string }
      required:
        - route_type
        - workflow_id
        - tags
        - confidence
        - switch_margin
        - reason_codes
        - clarifying_question
        - clarifying_options
      additionalProperties: false

    WorkflowAdapterEvent:
      type: object
      properties:
        type: { type: string }
        payload: { type: object }
      required: [type]

    WorkflowStackItem:
      type: object
      properties:
        run_id: { type: string }
        workflow_id: { type: string }
        status: { type: string }
        transition_reason: { type: string }
        created_at: { type: string, format: date-time }
      required: [run_id, workflow_id, transition_reason]

    OrchestratorResponseMessage:
      type: object
      properties:
        type:
          type: string
          enum: [assistant_message, clarification, system]
        text: { type: string }
        options:
          type: array
          items: { type: string }
      required: [type, text]

    OrchestratorDecisionTraceCandidate:
      type: object
      properties:
        workflow_id: { type: string }
        score:
          type: number
          nullable: true
        reason_codes:
          type: array
          items: { type: string }
      required: [workflow_id, reason_codes]

    OrchestratorDecisionTrace:
      type: object
      properties:
        mode:
          type: string
          enum: [direct, orchestrated]
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/OrchestratorDecisionTraceCandidate'
        selected_action: { type: string }
        selected_workflow_id:
          type: string
          nullable: true
        reason_codes:
          type: array
          items: { type: string }
        selection_reason:
          type: string
        switch_from_workflow_id:
          type: string
          nullable: true
        switch_to_workflow_id:
          type: string
          nullable: true
        switch_reason:
          type: string
          nullable: true
      required: [mode, candidates, selected_action, reason_codes, selection_reason]

    OrchestratorMessageResponse:
      type: object
      properties:
        decision_id: { type: string }
        mode:
          type: string
          enum: [direct, orchestrated]
        orchestrator_id:
          type: string
          nullable: true
        chosen_action:
          type: string
        chosen_workflow_id:
          type: string
          nullable: true
        run_id:
          type: string
          nullable: true
        active_run_id:
          type: string
          nullable: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
        decision:
          $ref: '#/components/schemas/RoutingDecision'
        decision_trace:
          $ref: '#/components/schemas/OrchestratorDecisionTrace'
        message:
          $ref: '#/components/schemas/OrchestratorResponseMessage'
        events:
          type: array
