      required:
        - api_base_url
        - chat_api_url
        - auth_profile
        - required_headers
        - optional_headers
        - project_scope
        - deprecations
        - operator_notes
        - secret_expiry

    AgentIntegrationCheckItem:
      type: object
      properties:
        id: { type: string }
        status:
