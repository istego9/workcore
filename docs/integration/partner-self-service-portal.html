<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WorkCore Partner Self-Service</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5a677f;
        --border: #dce3ef;
        --accent: #0f4db8;
        --accent-strong: #0a3a8a;
        --danger: #b42318;
        --ok: #067647;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "SF Pro Text", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 0 0, #ffffff 0%, var(--bg) 46%);
        color: var(--text);
      }
      .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 28px 20px 40px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: 0 12px 36px rgba(14, 32, 67, 0.08);
        padding: 20px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 26px;
        line-height: 1.25;
      }
      .hint {
        margin: 0;
        color: var(--muted);
      }
      .identity {
        margin-top: 16px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #eef3ff;
        border: 1px solid #c7d7ff;
        font-size: 14px;
      }
      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px 16px;
        margin-top: 18px;
      }
      .full {
        grid-column: 1 / -1;
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }
      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 11px;
        font-size: 14px;
        color: var(--text);
      }
      input:focus {
        outline: 2px solid #c4d6ff;
        border-color: var(--accent);
      }
      .actions {
        margin-top: 8px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      details {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
      }
      details summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }
      .advanced-grid {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 11px 16px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        cursor: pointer;
      }
      button:hover {
        background: var(--accent-strong);
      }
      button:disabled {
        cursor: progress;
        opacity: 0.7;
      }
      #result {
        margin-top: 14px;
        font-size: 14px;
        white-space: pre-wrap;
      }
      .ok {
        color: var(--ok);
      }
      .error {
        color: var(--danger);
      }
      @media (max-width: 760px) {
        form {
          grid-template-columns: 1fr;
        }
        .advanced-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="panel">
        <h1>Partner App Onboarding</h1>
        <p class="hint">Fill minimal fields and download an onboarding ZIP package for the partner integration team.</p>
        <div class="identity" id="identity"></div>

        <form id="onboard-form">
          <label class="full">
            Display Name (required)
            <input id="display_name" name="display_name" required placeholder="Acme Production" />
          </label>

          <details class="full">
            <summary>Advanced overrides (optional)</summary>
            <div class="advanced-grid">
              <label>
                Partner ID (auto-generated if empty)
                <input id="partner_id" name="partner_id" placeholder="acme-prod-1a2b3c" />
              </label>

              <label>
                Tenant ID (Pinned, defaults to Partner ID)
                <input id="tenant_id_pinned" name="tenant_id_pinned" placeholder="tenant_acme" />
              </label>

              <label class="full">
                Entra App Display Name (optional)
                <input id="entra_app_display_name" name="entra_app_display_name" placeholder="workcore-partner-acme" />
              </label>
            </div>
          </details>

          <label>
            Secret Expiry (months)
            <input id="secret_expiry_months" name="secret_expiry_months" type="number" min="1" max="24" value="12" />
          </label>

          <label>
            Rate Limit Profile
            <input id="rate_limit_profile" name="rate_limit_profile" value="default" />
          </label>

          <label class="full">
            Allowed Domains (comma-separated)
            <input id="allowed_domains" name="allowed_domains" placeholder="api.example.com" />
          </label>

          <label class="full">
            Base URL
            <input id="base_url" name="base_url" placeholder="https://api.example.com" />
          </label>

          <p class="hint full" id="host-policy-hint"></p>

          <div class="full actions">
            <button id="submit-btn" type="submit">Generate ZIP</button>
          </div>
        </form>

        <div id="result"></div>
      </div>
    </div>

    <script>
      window.__WORKCORE_CONTEXT__ = __WORKCORE_PARTNER_PORTAL_CONTEXT__;

      const context = window.__WORKCORE_CONTEXT__ || {};
      const identityEl = document.getElementById("identity");
      const resultEl = document.getElementById("result");
      const form = document.getElementById("onboard-form");
      const submitBtn = document.getElementById("submit-btn");
      const baseUrlInput = document.getElementById("base_url");
      const allowedDomainsInput = document.getElementById("allowed_domains");
      const displayNameInput = document.getElementById("display_name");
      const partnerIdInput = document.getElementById("partner_id");
      const tenantIdPinnedInput = document.getElementById("tenant_id_pinned");
      const entraAppDisplayNameInput = document.getElementById("entra_app_display_name");
      const hostPolicyHintEl = document.getElementById("host-policy-hint");
      const EPAM_BASE_URL = "https://api.runwcr.com";
      const EPAM_ALLOWED_DOMAINS = "api.runwcr.com";

      identityEl.textContent = `Signed in as: ${context.user_email || "unknown"} | Tenant: ${context.tenant_id || "unknown"}`;

      const parseDomains = (value) =>
        value
          .split(",")
          .map((item) => item.trim())
          .filter(Boolean);

      const hostFromBaseUrl = (value) => {
        try {
          return new URL(value).host || "";
        } catch (err) {
          return "";
        }
      };

      const defaultBaseUrl = context.default_base_url || "";
      const defaultAllowedDomains = hostFromBaseUrl(defaultBaseUrl);
      let epamLockApplied = false;

      const isEpamPartner = () =>
        [
          displayNameInput.value,
          partnerIdInput.value,
          tenantIdPinnedInput.value,
          entraAppDisplayNameInput.value,
        ].some((value) => value.trim().toLowerCase().includes("epam"));

      const applyHostPolicy = () => {
        if (isEpamPartner()) {
          baseUrlInput.value = EPAM_BASE_URL;
          allowedDomainsInput.value = EPAM_ALLOWED_DOMAINS;
          baseUrlInput.readOnly = true;
          allowedDomainsInput.readOnly = true;
          hostPolicyHintEl.textContent = "EPAM policy: onboarding package will use only https://api.runwcr.com.";
          epamLockApplied = true;
          return;
        }

        if (epamLockApplied) {
          baseUrlInput.value = defaultBaseUrl;
          allowedDomainsInput.value = defaultAllowedDomains;
        } else {
          if (!baseUrlInput.value.trim()) {
            baseUrlInput.value = defaultBaseUrl;
          }
          if (!allowedDomainsInput.value.trim()) {
            allowedDomainsInput.value = defaultAllowedDomains;
          }
        }
        baseUrlInput.readOnly = false;
        allowedDomainsInput.readOnly = false;
        hostPolicyHintEl.textContent = defaultBaseUrl
          ? `Default onboarding host: ${defaultBaseUrl}`
          : "";
        epamLockApplied = false;
      };

      applyHostPolicy();
      for (const input of [displayNameInput, partnerIdInput, tenantIdPinnedInput, entraAppDisplayNameInput]) {
        input.addEventListener("input", applyHostPolicy);
      }

      const parseFilename = (value) => {
        if (!value) return "partner-onboarding.zip";
        const match = value.match(/filename\*=UTF-8''([^;]+)|filename=\"?([^\";]+)\"?/i);
        if (!match) return "partner-onboarding.zip";
        return decodeURIComponent(match[1] || match[2]);
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        resultEl.className = "";
        resultEl.textContent = "Generating package...";
        submitBtn.disabled = true;

        const payload = {
          display_name: document.getElementById("display_name").value.trim(),
          secret_expiry_months: Number(document.getElementById("secret_expiry_months").value || "12"),
          rate_limit_profile: document.getElementById("rate_limit_profile").value.trim(),
          allowed_domains: parseDomains(document.getElementById("allowed_domains").value),
          base_url: document.getElementById("base_url").value.trim(),
        };

        const partnerId = document.getElementById("partner_id").value.trim();
        const tenantIdPinned = document.getElementById("tenant_id_pinned").value.trim();
        const entraAppDisplayName = document.getElementById("entra_app_display_name").value.trim();

        if (partnerId) {
          payload.partner_id = partnerId;
        }
        if (tenantIdPinned) {
          payload.tenant_id_pinned = tenantIdPinned;
        }
        if (entraAppDisplayName) {
          payload.entra_app_display_name = entraAppDisplayName;
        }

        try {
          const response = await fetch("/internal/partner-access/onboard-package", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            let detail = `${response.status} ${response.statusText}`;
            try {
              const body = await response.json();
              if (body && body.error && body.error.message) {
                detail = `${response.status} ${body.error.code || "ERROR"}: ${body.error.message}`;
              }
            } catch (err) {
              // keep default detail
            }
            throw new Error(detail);
          }

          const blob = await response.blob();
          const filename = parseFilename(response.headers.get("content-disposition"));
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = filename;
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          URL.revokeObjectURL(url);

          resultEl.className = "ok";
          resultEl.textContent = "Onboarding package is ready and downloaded.";
        } catch (error) {
          resultEl.className = "error";
          resultEl.textContent = `Failed: ${error.message}`;
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
