name: workcore-local

x-db-env: &db-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-workflow}
  CHATKIT_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-workflow}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-workflow}"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  migrate:
    image: workcore-local/orchestrator:dev
    command: python scripts/migrate.py
    restart: "no"
    environment:
      <<: *db-env
    depends_on:
      postgres:
        condition: service_healthy

  orchestrator:
    image: workcore-local/orchestrator:dev
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.orchestrator
    command: uvicorn apps.orchestrator.api.service:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment:
      <<: *db-env
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      AGENT_EXECUTOR_MODE: ${AGENT_EXECUTOR_MODE:-mock}
      WEBHOOK_DEFAULT_INTEGRATION_KEY: ${WEBHOOK_DEFAULT_INTEGRATION_KEY:-default}
      WEBHOOK_DEFAULT_INBOUND_SECRET: ${WEBHOOK_DEFAULT_INBOUND_SECRET:-}
      WORKCORE_API_AUTH_TOKEN: ${WORKCORE_API_AUTH_TOKEN:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://workcore.build,https://workcore.build,http://hq21.build,https://hq21.build}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"
        ]
      interval: 10s
      timeout: 3s
      retries: 20

  chatkit:
    image: workcore-local/orchestrator:dev
    command: uvicorn apps.orchestrator.chatkit.service:app --host 0.0.0.0 --port 8001
    restart: unless-stopped
    environment:
      <<: *db-env
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      AGENT_EXECUTOR_MODE: ${AGENT_EXECUTOR_MODE:-mock}
      CHATKIT_AUTH_TOKEN: ${CHATKIT_AUTH_TOKEN:-dev_chatkit_token}
      CHATKIT_OBJECT_ENDPOINT: minio:9000
      CHATKIT_OBJECT_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      CHATKIT_OBJECT_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      CHATKIT_OBJECT_BUCKET: ${CHATKIT_OBJECT_BUCKET:-chatkit}
      CHATKIT_OBJECT_SECURE: "false"
      CHATKIT_OBJECT_PREFIX: ${CHATKIT_OBJECT_PREFIX:-chatkit}
      CHATKIT_UPLOAD_EXPIRES_SECONDS: ${CHATKIT_UPLOAD_EXPIRES_SECONDS:-3600}
      CHATKIT_OBJECT_CREATE_BUCKET: "true"
      CHATKIT_IDEMPOTENCY_TTL_SECONDS: ${CHATKIT_IDEMPOTENCY_TTL_SECONDS:-300}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://workcore.build,https://workcore.build,http://hq21.build,https://hq21.build}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2)"
        ]
      interval: 10s
      timeout: 3s
      retries: 20

  builder:
    image: workcore-local/builder:dev
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.builder
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-//api.workcore.build}
      VITE_CHATKIT_PAGE: ${VITE_CHATKIT_PAGE:-//workcore.build/chatkit.html}
      VITE_CHATKIT_API_URL: ${VITE_CHATKIT_API_URL:-//chatkit.workcore.build/chatkit}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-workcore.build,builder.localhost,localhost,127.0.0.1}
      VITE_CHATKIT_DOMAIN_KEY: ${VITE_CHATKIT_DOMAIN_KEY:-}
      VITE_CHATKIT_AUTH_TOKEN: ${VITE_CHATKIT_AUTH_TOKEN:-dev_chatkit_token}
    depends_on:
      orchestrator:
        condition: service_healthy
      chatkit:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:5173/"
        ]
      interval: 10s
      timeout: 3s
      retries: 20

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
      chatkit:
        condition: service_healthy
      builder:
        condition: service_healthy
    ports:
      - "${WORKCORE_HTTP_PORT:-80}:8080"
      - "${WORKCORE_HTTPS_PORT:-443}:8443"
    environment:
      PROXY_PORT: "8080"
      PROXY_TLS_PORT: "8443"
      PUBLIC_BUILDER_HOST: ${PUBLIC_BUILDER_HOST:-workcore.build}
      PUBLIC_API_HOST: ${PUBLIC_API_HOST:-api.workcore.build}
      PUBLIC_CHATKIT_HOST: ${PUBLIC_CHATKIT_HOST:-chatkit.workcore.build}
      BUILDER_UPSTREAM: builder:5173
      API_UPSTREAM: orchestrator:8000
      CHATKIT_UPSTREAM: chatkit:8001
      TLS_CERT_FILE: /certs/workcore.build.pem
      TLS_KEY_FILE: /certs/workcore.build-key.pem
    volumes:
      - ./deploy/docker/Caddyfile.workcore:/etc/caddy/Caddyfile:ro
      - ./.certs:/certs:ro

volumes:
  postgres_data:
  minio_data:
